<script>const QUIZ_DATA={"exame_fisico":[{"question": "Na regra de ouro do exame físico reumatológico, o que diferencia artrite de periartrite?", "options": ["Na artrite, tanto o movimento ativo quanto o passivo são dolorosos e limitados; na periartrite, apenas o movimento ativo é doloroso, com o passivo preservado.", "Na artrite, apenas o movimento ativo é doloroso e limitado; na periartrite, ambos os movimentos são igualmente dolorosos e restritos em todas as direções.", "Na artrite, o movimento passivo é preservado e indolor; na periartrite, ambos os movimentos são dolorosos e limitados de forma simétrica.", "Na artrite, apenas o movimento passivo é doloroso e limitado; na periartrite, apenas o movimento ativo é doloroso, porém com amplitude preservada.", "Na artrite e na periartrite, ambos os movimentos são igualmente dolorosos, sendo a localização da dor na linha articular o único critério diferenciador confiável."], "correctIndex": 0, "explanation": "A regra de ouro: artrite = movimento ativo E passivo dolorosos/limitados (inflamação intra-articular afeta qualquer movimentação); periartrite = apenas o ativo é doloroso, pois o passivo não estira a estrutura periarticular afetada (tendão, bursa). Exemplo clássico: tendinite supraespinhal (periartrite) tem passivo normal.", "type": "conteudista"}, {"question": "Qual das situações a seguir representa uma exceção à regra 'ativo vs passivo' na diferenciação entre artrite e periartrite?", "options": ["Na artropatia hemofílica, o movimento passivo pode ser mais doloroso que o ativo devido a hemorragias intra-articulares recorrentes que causam sensibilidade extrema.", "Na tendinite supraespinhal, tanto o movimento ativo quanto o passivo são dolorosos e igualmente limitados, mimetizando artrite glenoumeral verdadeira.", "Na bursite trocantérica, o movimento ativo é preservado enquanto o passivo torna-se progressivamente doloroso com a evolução do processo inflamatório local.", "Na osteoartrite do joelho avançada, o movimento passivo torna-se mais doloroso que o ativo devido ao acúmulo progressivo de líquido sinovial sob pressão.", "Na contratura muscular aguda pós-esforço, o movimento passivo é mais doloroso que o ativo porque há contração reflexa do músculo durante a avaliação pelo examinador."], "correctIndex": 0, "explanation": "Exceções à regra: (1) Artropatia hemofílica — passivo mais doloroso por hipersensibilidade articular extrema; (2) Ruptura total de tendão — ativo abolido, passivo preservado; (3) Contratura capsular (capsulite adesiva) — ativo e passivo limitados sem ser artrite. Conhecer essas exceções evita erros diagnósticos.", "type": "conteudista"}, {"question": "Qual é a sequência correta da estrutura padronizada do exame musculoesquelético (MSK)?", "options": ["Inspeção → Exame de rastreio → Palpação → ADM (Amplitude de Movimento) → Testes especiais", "Palpação → Inspeção → ADM → Exame de rastreio → Testes especiais", "Exame de rastreio → Inspeção → Palpação → ADM → Testes especiais", "Inspeção → ADM → Palpação → Exame de rastreio → Testes especiais", "ADM → Inspeção → Palpação → Exame de rastreio → Testes especiais"], "correctIndex": 0, "explanation": "A sequência padronizada é: (1) Inspeção visual; (2) Rastreio — movimentação ativa ampla, se normal a articulação é normal; (3) Palpação — calor, sensibilidade, bursas; (4) ADM ativa + passiva; (5) Testes especiais conforme hipótese. Seguir essa ordem garante sistematização e evita saltar etapas.", "type": "conteudista"}, {"question": "Qual nervo inerva a face palmar dos dedos 1 a 3 e metade do 4º dedo, passando pelo túnel do carpo?", "options": ["Nervo mediano, que ao ser comprimido no túnel do carpo causa a síndrome de mesmo nome, com parestesia na distribuição palmar dos 3,5 dedos laterais.", "Nervo ulnar, que ao ser comprimido no canal de Guyon causa parestesia no 5º dedo e na metade medial do 4º dedo com fraqueza dos interósseos.", "Nervo radial, que inerva principalmente a face dorsal dos dedos 1 a 3 e pode ser comprimido no sulco de torção do úmero causando mão caída.", "Nervo interósseo anterior, ramo terminal do nervo mediano que inerva a musculatura intrínseca da mão sem componente sensitivo significativo.", "Nervo digital palmar comum, ramo superficial que inerva a face palmar de todos os dedos de forma uniforme e simétrica em ambas as mãos."], "correctIndex": 0, "explanation": "O nervo mediano inerva a face palmar dos dedos 1-3 e metade do 4. O ulnar inerva o 5º e metade do 4º (canal de Guyon). O radial inerva a face dorsal. Essa distinção é fundamental para localizar lesões nervosas no punho e interpretar os testes de Phalen e Tinel.", "type": "conteudista"}, {"question": "Na avaliação das mãos, qual afirmação está correta sobre o padrão de envolvimento articular da Artrite Reumatoide (AR) em comparação com a Osteoartrite (OA)?", "options": ["A AR geralmente poupa as articulações IFDs (interfalangeanas distais), enquanto a OA e a artrite psoriásica frequentemente as acometem com nódulos de Heberden ou erosões.", "A AR acomete preferencialmente as articulações IFDs formando nódulos, enquanto a OA poupa essas articulações e afeta principalmente as MCPs e punhos bilateralmente.", "Tanto a AR quanto a OA acometem indistintamente todas as articulações das mãos, sendo impossível diferenciá-las apenas pelo padrão de distribuição articular.", "A AR acomete preferencialmente as IFPs e MCPs, mas também as IFDs com frequência similar à OA, tornando o padrão pouco útil para diagnóstico diferencial.", "A OA inflamatória afeta exclusivamente as articulações MCPs e punhos, enquanto a AR poupa essas articulações e acomete apenas IFPs e IFDs com nódulos."], "correctIndex": 0, "explanation": "Regra prática: AR poupa IFDs (acomete MCPs, PIPs, punhos); OA acomete IFDs (nódulos de Heberden) e IFPs (nódulos de Bouchard); psoríase acomete IFDs com erosões. Essa distinção de padrão articular é o primeiro passo do diagnóstico diferencial nas doenças de mão.", "type": "conteudista"}, {"question": "Qual das deformidades a seguir é característica da Artrite Reumatoide nas mãos?", "options": ["Desvio ulnar dos dedos com edema das articulações MCPs e PIPs, podendo evoluir para deformidades em pescoço de cisne e boutonnière ao longo da doença.", "Nódulos de Heberden nas IFDs e nódulos de Bouchard nas IFPs, com endurecimento progressivo e limitação crônica dos movimentos finos das mãos.", "Dactilite com edema difuso e uniforme de todo o dedo, conferindo aspecto de 'dedo em salsicha' típico da artrite psoriásica e das espondiloartrites.", "Onicólise com descolamento da lâmina ungueal e placas eritematosas com escamas na pele periarticular, manifestações típicas da artrite psoriásica.", "Tofos subcutâneos periarticulares com depósito de cristais de urato monossódico, mais frequentes na 1ª MTP e região do olécrano na gota crônica."], "correctIndex": 0, "explanation": "Deformidades características da AR: desvio ulnar das MCPs, edema sinovial de MCPs/PIPs, pescoço de cisne (hiperextensão IFP + flexão IFD) e boutonnière (flexão IFP + hiperextensão IFD). Nódulos de Heberden/Bouchard são da OA; dactilite é das espondiloartrites; tofos são da gota.", "type": "conteudista"}, {"question": "O teste de Finkelstein é realizado fechando o punho com o polegar dentro e fazendo desvio ulnar. Quando positivo, o que indica?", "options": ["Tendinite de De Quervain, pela dor na região radial do punho ao estressar os tendões do abdutor longo e extensor curto do polegar no 1º compartimento dorsal.", "Síndrome do túnel do carpo, pela reprodução de parestesia nos dedos 1 a 3 ao comprimir o nervo mediano na região do retináculo flexor do punho.", "Lesão do ligamento escafossemilunar, pela dor dorsal central do punho ao promover translação ulnar forçada da fileira proximal do carpo.", "Tenossinovite dos flexores dos dedos, pela dor palmar difusa e crepitação ao deslizar os tendões dentro da bainha sinovial comprimida.", "Artrite da articulação carpometacarpiana do polegar, pela dor na base do polegar ao promover carga axial combinada com desvio ulnar do punho."], "correctIndex": 0, "explanation": "O Finkelstein estira os tendões do 1º compartimento dorsal (abdutor longo e extensor curto do polegar). Positivo → dor na região radial do punho = Tendinite de De Quervain. Não confundir com Phalen (túnel do carpo = parestesia digital) nem Tinel (choque elétrico à percussão).", "type": "conteudista"}, {"question": "Em qual posição e por quanto tempo é realizado o teste de Phalen, e qual é o resultado positivo?", "options": ["Prece invertida (flexão dorsal máxima de punhos) mantida por 60 segundos; positivo quando há parestesia nos dedos 1 a 3 e metade do 4º, indicando compressão do nervo mediano.", "Percussão sobre o túnel do carpo com o dedo do examinador por algumas repetições; positivo quando o paciente refere choque elétrico irradiando para os dedos 1 a 3.", "Punho em extensão forçada contra resistência do examinador por 30 segundos; positivo quando há dor palmar e fraqueza ao pinçar, sugerindo neuropatia do mediano.", "Flexão do punho a 90° com o cotovelo estendido e supinação por 30 segundos; positivo quando há formigamento no 5º dedo e borda medial do 4º dedo.", "Extensão passiva forçada do polegar com desvio radial por 45 segundos; positivo quando há dor na tabaqueira anatômica e limitação progressiva da pinça lateral."], "correctIndex": 0, "explanation": "Phalen = prece invertida (flexão dorsal de punhos) por 60 segundos → comprime o nervo mediano no túnel do carpo → parestesia em dedos 1-3 e metade do 4 = positivo para síndrome do túnel do carpo. Tinel = percussão sobre o túnel → choque elétrico. Finkelstein = De Quervain.", "type": "conteudista"}, {"question": "O teste Empty Can (Jobe) avalia especificamente qual estrutura do ombro, e qual posicionamento é usado?", "options": ["Supraespinhal (manguito rotador); ombro em abdução de 90° com flexão de 30° e polegar apontado para baixo (rotação interna), resistindo à força do examinador.", "Infraespinhal do manguito rotador; ombro em rotação externa com cotovelo a 90°, resistindo à força do examinador que tenta promover rotação interna passiva.", "Tendão do bíceps (cabeça longa); ombro em flexão de 90° com cotovelo estendido, resistindo ao movimento de supinação ativa contra a mão do examinador.", "Subescapular do manguito rotador; ombro a 0° com cotovelo a 90°, realizando rotação interna contra resistência com dorso da mão afastado das costas.", "Articulação acromioclavicular; ombro em adução horizontal forçada com cotovelo estendido, avaliando dor específica na articulação AC ao final do arco."], "correctIndex": 0, "explanation": "Empty Can/Jobe: ABD 90°, FLX 30°, polegar para baixo (RI) + resistência → avalia supraespinhal. Hawkins: FLX 90°, cotovelo 90°, RI passiva → impacto subacromial. Yergason: cotovelo 90°, supinação contra resistência → bíceps. Apprehension: ABD 90° + RE 90° → instabilidade glenoumeral.", "type": "conteudista"}, {"question": "O teste de Hawkins avalia impacto do manguito rotador. Qual é a posição correta para realizá-lo?", "options": ["Ombro em flexão de 90°, cotovelo em 90° e rotação interna passiva forçada; positivo quando há dor anterior indicando impacto do tendão supraespinhal sob o arco coracoacromial.", "Ombro em abdução de 90° com flexão de 30° e polegar apontado para baixo; positivo com dor ou fraqueza indicando lesão do tendão supraespinhal pelo teste isométrico.", "Ombro em extensão passiva máxima com adução horizontal; positivo com dor na articulação acromioclavicular ao comprimir o tendão supraespinhal contra o acrômio.", "Ombro em abdução progressiva até 180° contra resistência do examinador; positivo quando o braço cai subitamente por incapacidade de manter a abdução completa.", "Cotovelo a 90° com o antebraço em supinação ativa contra resistência do examinador; positivo quando há dor reproduzida no sulco bicipital anterior do ombro."], "correctIndex": 0, "explanation": "Hawkins: ombro FLX 90° + cotovelo 90° + RI passiva → impacto do supraespinhal sob o ligamento coracoacromial → dor anterior = positivo. Diferente do Empty Can (ABD 90° + FLX 30° + polegar baixo) que testa força do supraespinhal. Yergason = bíceps (supinação contra resistência).", "type": "conteudista"}, {"question": "Qual é a posição do joelho e o achado positivo no teste de Lachman?", "options": ["Joelho em 20-30° de flexão; laxidão anterior da tíbia ao puxar para frente, com sensibilidade de 94% para lesão do LCA, superior ao teste de gaveta anterior.", "Joelho em 90° de flexão; deslocamento anterior da tíbia sobre o fêmur ao puxar para frente, com especificidade de 96% para lesão do LCA nessa posição.", "Joelho em 90° de flexão; deslocamento posterior da tíbia ao empurrar para trás, indicando lesão do ligamento cruzado posterior (LCP) com instabilidade posterior.", "Joelho em extensão completa; abertura medial ao aplicar força valgo com leve flexão, com instabilidade indicando lesão do ligamento colateral medial (LCM).", "Joelho em leve flexão; crepitação e click na linha articular ao rotar a tíbia e estender o joelho progressivamente, indicando lesão de menisco medial ou lateral."], "correctIndex": 0, "explanation": "Lachman: joelho 20-30° FLX + puxar tíbia para frente → laxidão = LCA lesionado. Sensibilidade 94%, superior à gaveta anterior (90° FLX). Gaveta anterior (90°) testa LCA com especificidade 96%. Gaveta posterior (90°, empurra tíbia para trás) = LCP. McMurray = menisco.", "type": "conteudista"}, {"question": "Como é realizado o teste de McMurray e qual estrutura avalia?", "options": ["Com o joelho fletido, o examinador rota a tíbia e estende o joelho progressivamente; positivo com dor e estalo na linha articular, indicando lesão de menisco.", "Com o paciente em decúbito ventral e joelho a 90°, o examinador comprime e rota a tíbia; positivo com dor na linha articular medial ou lateral pelo Apley.", "Com o joelho a 20-30° de flexão, o examinador estabiliza o fêmur e puxa a tíbia para anterior; positivo com laxidão, indicando lesão do ligamento cruzado anterior.", "Com o joelho em extensão e leve flexão, o examinador aplica força em varo; positivo com abertura lateral, indicando lesão do ligamento colateral lateral (LCL).", "Com o paciente em decúbito dorsal e joelho estendido, o examinador comprime a suprapatela e empurra a patela; positivo com flutuação indicando derrame articular."], "correctIndex": 0, "explanation": "McMurray: joelho fletido → rotação da tíbia + extensão progressiva → click/dor na linha articular = menisco lesionado. Medial ao rotar externamente, lateral ao rotar internamente. Apley: prono, joelho 90°, comprimir + rotar. Lachman e gaveta = ligamentos cruzados. Piparote patelar = derrame.", "type": "conteudista"}, {"question": "Qual a diferença clínica entre o sinal da onda e o piparote patelar na detecção de derrame articular no joelho?", "options": ["O sinal da onda detecta derrames moderados (>10 ml) pelo deslocamento de fluido ao comprimir a linha articular; o piparote patelar identifica derrames mais volumosos (>20 ml) pela flutuação da patela.", "O sinal da onda detecta apenas derrames leves (<5 ml) pela percepção tátil de ondulação sinovial sutil; o piparote patelar é menos sensível e detecta volumes muito maiores.", "O sinal da onda avalia o compartimento lateral comprimindo a bursa prepatelar; o piparote patelar avalia o compartimento medial comprimindo o recesso suprapatelar.", "O sinal da onda é o método mais específico para derrames hemorrágicos e sépticos; o piparote patelar é utilizado exclusivamente para derrames sinoviais benignos.", "O sinal da onda e o piparote patelar avaliam os mesmos volumes de derrame, sendo a diferença apenas técnica, sem implicação diagnóstica ou clínica na prática."], "correctIndex": 0, "explanation": "Sinal da onda: comprime suprapatela com uma mão, pressiona linha articular com a outra → fluido desloca a mão = positivo. Sensibilidade alta para >10 ml. Piparote patelar: comprime suprapatela + empurra patela contra fêmur → patela 'flutua' (clunk) = especificidade alta para >20 ml.", "type": "conteudista"}, {"question": "Na avaliação da coluna lombossacra, quais características diferenciam a dor inflamatória (espondiloartrite) da dor mecânica?", "options": ["A dor inflamatória tem rigidez matinal >30 min, piora com repouso, melhora com exercício e apresenta dor noturna; a mecânica tem rigidez <30 min, melhora com repouso e sem dor noturna.", "A dor inflamatória tem rigidez matinal <15 min, piora com exercício e melhora com repouso; a mecânica tem rigidez >60 min, melhora com exercício e apresenta dor noturna.", "A dor inflamatória surge apenas aos esforços e desaparece completamente com repouso; a mecânica é contínua, sem relação com atividade física e sempre acompanha dor noturna intensa.", "A dor inflamatória acomete exclusivamente a coluna torácica superior; a mecânica acomete a região lombossacra com irradiação para os membros inferiores em padrão dermatomal.", "A dor inflamatória e a mecânica apresentam o mesmo padrão de rigidez matinal, sendo a dor noturna o único critério capaz de diferenciá-las na avaliação clínica inicial."], "correctIndex": 0, "explanation": "Dor inflamatória (EA, espondiloartrite): rigidez matinal >30 min, MELHORA com exercício, PIORA com repouso, dor noturna, Schober <5 cm. Dor mecânica (OA, muscular): rigidez <30 min, MELHORA com repouso, PIORA com movimento, sem dor noturna. A duração da rigidez matinal é o principal divisor.", "type": "conteudista"}, {"question": "Como é realizado o teste de Schober e o que indica quando o resultado é positivo (expansão <5 cm)?", "options": ["Marca-se 10 cm acima e 5 cm abaixo da linha bi-espinhal; o paciente flete o tronco e expansão <5 cm entre as marcas sugere limitação da mobilidade lombar, como na espondilite anquilosante.", "Marca-se 15 cm acima da linha bi-espinhal apenas; o paciente flete o tronco e expansão <5 cm indica hipermobilidade, enquanto expansão >10 cm sugere restrição patológica.", "Marca-se 5 cm acima da linha bi-espinhal; o paciente flete o tronco e expansão <3 cm confirma normalidade da coluna lombar sem critério para processo inflamatório.", "Marca-se 10 cm acima do processo espinhoso de L4; o paciente faz extensão da coluna e expansão <8 cm sugere fratura vertebral por osteoporose com colapso posterior.", "Marca-se 5 cm acima e 5 cm abaixo da linha bi-espinhal; o paciente inclina lateralmente e expansão <5 cm sugere escoliose lombar estrutural com componente inflamatório."], "correctIndex": 0, "explanation": "Schober: marcar 10 cm ACIMA e 5 cm ABAIXO da linha bi-espinhal (L4-L5). Paciente flete o tronco → medir distância entre as marcas. Normal: expansão ≥5 cm. Expansão <5 cm = mobilidade lombar reduzida, sugestivo de espondilite anquilosante. Usado para acompanhar progressão da doença.", "type": "conteudista"}, {"question": "Em qual amplitude de elevação da perna estendida o teste de Lasègue (EPE) é considerado positivo, e o que indica?", "options": ["Entre 30° e 70°; dor radicular que desce pela perna (não apenas dor lombar) indica compressão de raiz nervosa, tipicamente por hérnia de disco L4-L5 ou L5-S1.", "Entre 70° e 90°; dor exclusivamente na face posterior da coxa indica compressão do nervo femoral por hérnia de disco lombar alta em L2-L3.", "Entre 0° e 30°; dor na região lombar irradiando para a face anterior da coxa indica estenose do canal vertebral lombar com mielopatia cervical.", "Entre 30° e 90°; dor apenas lombar sem irradiação indica hérnia de disco com compressão radicular significativa em nível lombar baixo.", "Entre 45° e 60°; dor irradiada para a face anterior da coxa indica compressão de L2-L3 por doença degenerativa facetária lombar alta."], "correctIndex": 0, "explanation": "Lasègue/EPE: paciente supino, elevar perna estendida entre 30-70° → dor RADICULAR descendo pela perna (não apenas lombar) = positivo, indica hérnia L5-S1. Lasègue cruzado: elevar perna NÃO dolorosa → dor na perna sintomática = hérnia grande. Dor apenas lombar não é considerada positivo.", "type": "conteudista"}, {"question": "O teste FABER avalia qual estrutura e como é realizado?", "options": ["Avalia a articulação sacroilíaca; com o tornozelo do paciente apoiado sobre o joelho oposto, o examinador pressiona o joelho para baixo; positivo com dor na sacroilíaca.", "Avalia o impacto femoroacetabular; com o quadril em flexão, adução e rotação interna, o examinador comprime o acetábulo; positivo com dor na virilha anterior.", "Avalia a integridade dos flexores do quadril; com o paciente supino, o examinador eleva a perna estendida contra resistência; positivo com dor na virilha e fraqueza.", "Avalia o tendão do reto femoral; com o paciente em decúbito ventral, o examinador flete o joelho a 130°; positivo com elevação da pelve indicando encurtamento muscular.", "Avalia a articulação coxofemoral por carga axial; com o paciente em pé sobre uma perna, o examinador avalia descida da pelve contralateral indicando fraqueza do glúteo médio."], "correctIndex": 0, "explanation": "FABER = Flexão, ABdução, Rotação Externa do quadril (tornozelo no joelho oposto, 'perna cruzada') → examinador empurra joelho para baixo. Positivo = dor na sacroilíaca ipsilateral. Diferente do FADIR (Flexão, ADução, Rotação Interna) que avalia impacto femoroacetabular com dor na virilha.", "type": "conteudista"}, {"question": "O teste FADIR indica impacto femoroacetabular (IFA) quando positivo. Qual manobra o compõe?", "options": ["Quadril em flexão passiva, seguida de adução e rotação interna; positivo quando há dor na virilha ou limitação de movimento, sugerindo compressão entre cabeça femoral e acetábulo.", "Quadril em extensão passiva com abdução e rotação externa mantidas; positivo quando há dor posterior na pelve, indicando irritação da articulação sacroilíaca ipsilateral.", "Quadril em flexão de 90°, abdução e rotação externa mantidas por 30 segundos; positivo com dor na face medial da coxa e região inguinal sugerindo patologia de sínfise.", "Quadril em extensão e adução com joelho estendido; positivo com tensão na face lateral da coxa indicando encurtamento do trato iliotibial e síndrome da banda iliotibial.", "Quadril em posição neutra com carga axial em apoio unipodal; positivo com descida da pelve contralateral >2 cm indicando fraqueza do glúteo médio ipsilateral."], "correctIndex": 0, "explanation": "FADIR = Flexão + ADução + Rotação Interna do quadril → comprime o lábio acetabular entre cabeça femoral e borda anterior do acetábulo. Positivo = dor na virilha = Impacto FemorAcetabular (IFA). FABER = sacroilíaca. Trendelenburg = glúteo médio. Ober = trato iliotibial.", "type": "conteudista"}, {"question": "O teste de Thompson avalia qual estrutura e qual é o achado positivo?", "options": ["Integridade do tendão de Aquiles; com o paciente em decúbito ventral, o examinador comprime a panturrilha; ausência de flexão plantar indica ruptura completa do tendão.", "Integridade do ligamento talofibular anterior (LTFA); com o calcanhar estabilizado, o examinador inverte o retropé; abertura >10-15° indica lesão do ligamento lateral.", "Articulação metatarsofalângica; comprimindo as cabeças dos metatarsos lateralmente; dor indica artrite inflamatória das MTPs por AR, gota ou outras artrites.", "Tendão tibial posterior; com o paciente em pé sobre uma perna, solicita que suba na ponta do pé; impossibilidade de subir indica ruptura ou insuficiência do tendão.", "Nervo tibial posterior; a percussão do retromaléolo medial com parestesia irradiando para a planta do pé indica síndrome do túnel do tarso com neuropatia compressiva."], "correctIndex": 0, "explanation": "Thompson: paciente em decúbito ventral, comprimir panturrilha → normalmente causa flexão plantar passiva. Ausência de flexão plantar = POSITIVO = ruptura do tendão de Aquiles. Gaveta anterior do tornozelo = LTFA. Squeeze MTPs = artrite de MTPs. Inversão estresse = complexo lateral do tornozelo.", "type": "conteudista"}, {"question": "O que indica o teste de Trendelenburg positivo e como é interpretado clinicamente?", "options": ["Fraqueza dos abdutores do quadril (principalmente glúteo médio); a pelve desce mais de 2 cm no lado oposto à perna de apoio, indicando insuficiência do glúteo médio ipsilateral.", "Encurtamento do iliopsoas; a perna contralateral eleva-se da mesa ao tracionar o joelho ipsilateral ao peito, indicando contratura em flexão do quadril testada pelo Thomas.", "Lesão do ligamento colateral medial do quadril; a pelve inclina para o lado da perna de apoio ao carregar peso unipodal, indicando instabilidade medial do quadril.", "Impacto femoroacetabular; ao realizar adução e rotação interna do quadril em pé durante o apoio unipodal, o paciente sente dor inguinal limitando o apoio.", "Fraqueza do glúteo máximo; a pelve afunda para o lado da perna de apoio e o tronco compensa inclinando-se anteriormente durante a fase de apoio da marcha."], "correctIndex": 0, "explanation": "Trendelenburg: paciente em pé sobre uma perna → pelve desce >2 cm no lado oposto = positivo = fraqueza do GLÚTEO MÉDIO (abdutor do quadril) do lado de apoio. Diferente do Thomas (encurtamento de flexores), Ely (reto femoral), Stinchfield (iliopsoas/intra-articular) e FADIR (impacto femoroacetabular).", "type": "conteudista"}, {"question": "No rastreio rápido das mãos, qual manobra testa especificamente a flexão dorsal (extensão) do punho?", "options": ["Sinal da prece invertida: aproximar as palmas das mãos, verificando a amplitude de flexão dorsal do punho bilateralmente de forma comparativa.", "Sinal da prece (oração): aproximar os dorsos das mãos, verificando a amplitude de flexão palmar do punho com os dedos apontados para baixo.", "Força de preensão: testar o aperto bilateral com o examinador, verificando a força muscular dos flexores dos dedos e intrínsecos da mão.", "Fechar a mão em punho: avaliar se o paciente consegue fletir completamente todos os dedos, verificando amplitude de flexão metacarpofalangiana.", "Teste de Phalen: manter prece invertida por 60 segundos, verificando presença de parestesia nos dedos 1 a 3 por compressão do nervo mediano."], "correctIndex": 0, "explanation": "Rastreio das mãos: (1) Fechar punho = flexão dos dedos; (2) Prece invertida = flexão DORSAL do punho; (3) Prece/oração = flexão PALMAR do punho; (4) Força de preensão = força muscular. Se normal sem dor → articulação normal. O Phalen é um teste especial (60 s), não parte do rastreio básico.", "type": "conteudista"}, {"question": "Qual técnica de palpação é utilizada especificamente para avaliar as articulações metacarpofalangeanas (MCPs)?", "options": ["Técnica da tesoura: segura a mão lateralmente, flete as MCPs a 90° e palpa com os polegares, avaliando sensibilidade articular e presença de edema sinovial.", "Técnica de 4 dedos: uma mão segura lateralmente enquanto a outra palpa no sentido anteroposterior, avaliando especificamente as articulações interfalangeanas.", "Técnica de 2 polegares: um polegar segue o 3º metacarpo até o capitato enquanto o outro palpa a linha articular, avaliando a articulação do punho.", "Técnica em pinça bidigital: polegar e indicador do examinador comprimem a articulação lateral e medialmente com pressão uniforme para detectar flutuação.", "Técnica de pressão axial rotacional: o examinador aplica carga ao longo do eixo do dedo com rotação passiva simultânea para identificar crepitação intra-articular."], "correctIndex": 0, "explanation": "Técnicas de palpação das mãos: (1) Técnica da tesoura = MCPs (segura lateralmente, FLX 90°, palpa com polegares); (2) 4 dedos = PIPs e DIPs (lateral + anteroposterior); (3) 2 polegares = punho (polegar segue 3º metacarpo até capitato). Sempre bilateral para comparação.", "type": "conteudista"}, {"question": "Durante o arco doloroso de abdução do ombro, em qual faixa de amplitude a dor indica patologia da articulação acromioclavicular?", "options": ["Entre 170° e 180° de abdução, quando a articulação AC é comprimida ao final do movimento, gerando dor localizada nessa articulação.", "Entre 60° e 120° de abdução, quando o tendão supraespinhal passa sob o arco coracoacromial sofrendo impacto dinâmico e compressão progressiva.", "Entre 0° e 30° de abdução, quando o tendão do bíceps (cabeça longa) desliza no sulco bicipital com atrito durante o início do movimento.", "Entre 120° e 150° de abdução, quando os rotadores externos entram em tensão máxima e comprimem a cabeça umeral superiormente contra o acrômio.", "Entre 30° e 60° de abdução, quando o tendão infraespinhal é comprimido entre a tuberosidade maior e o processo coracoide no início do arco médio."], "correctIndex": 0, "explanation": "Arco doloroso: 60-120° = impacto do manguito rotador (supraespinhal sob o arco coracoacromial); 170-180° = articulação ACROMIOCLAVICULAR (AC). Dor em ângulos distintos orienta o diagnóstico: manguito rotador (amplitude média) vs articulação AC (amplitude final). Fundamental diferenciar na prática.", "type": "conteudista"}, {"question": "Paciente de 22 anos, jogador de futebol, apresenta edema imediato, estalo audível e instabilidade no joelho direito após pivotamento brusco. Teste de Lachman positivo. Qual estrutura está lesionada e qual a conduta?", "options": ["Ligamento cruzado anterior (LCA); conduta: ressonância magnética e avaliação ortopédica, pois o Lachman (joelho 20-30° FLX) é mais sensível (94%) que o teste de gaveta para LCA.", "Ligamento cruzado posterior (LCP); conduta: ressonância magnética urgente, pois o Lachman positivo indica deslocamento posterior da tíbia em lesão do LCP.", "Menisco medial; conduta: artroscopia imediata, pois o estalo indica lesão meniscal e o Lachman positivo confirma rompimento do corno posterior do menisco.", "Ligamento colateral medial (LCM); conduta: imobilização e fisioterapia, pois o pivotamento em valgo é típico de lesão do LCM com laxidão medial ao Lachman.", "Ligamento colateral lateral (LCL); conduta: órtese articulada, pois o mecanismo em varo durante o pivotamento lesiona o LCL com laxidão ao Lachman."], "correctIndex": 0, "explanation": "Mecanismo clássico de LCA: pivotamento, estalo + edema imediato + instabilidade. Lachman positivo (laxidão anterior com joelho 20-30°) = LCA. Sensibilidade 94%, superior à gaveta anterior (joelho 90°, especificidade 96%). Conduta: RM para confirmar + ortopedia. McMurray positivo (click) = menisco.", "type": "raciocinio"}, {"question": "Paciente de 55 anos com dor no ombro direito há 3 meses. Ao exame: arco doloroso entre 60° e 120°, teste Empty Can positivo e sinal de queda do braço (Drop Arm) positivo. Qual o diagnóstico mais provável?", "options": ["Ruptura do tendão supraespinhal; arco doloroso 60-120° indica impacto do manguito, Empty Can positivo confirma lesão do supraespinhal e Drop Arm positivo indica incapacidade de manter abdução por ruptura.", "Bursite subacromial aguda isolada; arco doloroso típico e impossibilidade de manter o braço elevado ocorrem por dor intensa sem lesão estrutural do manguito rotador.", "Lesão isolada do tendão bicipital; arco doloroso e fraqueza ao Yergason com dor no sulco bicipital explicam a incapacidade de manter a abdução pelo desequilíbrio.", "Instabilidade glenoumeral anterior crônica; apreensão ao elevar o braço no arco médio e incapacidade de manter abdução por medo de luxação recorrente.", "Artropatia acromioclavicular severa; dor em todo o arco de abdução e incapacidade de completar o movimento por compressão progressiva da articulação AC."], "correctIndex": 0, "explanation": "Ruptura do supraespinhal: (1) Arco doloroso 60-120° = impacto do manguito; (2) Empty Can positivo = lesão/fraqueza do supraespinhal; (3) Drop Arm positivo = braço cai ao abaixar lentamente = ruptura (não consegue controlar excêntrico). Bursite: arco doloroso + Empty Can positivo, mas Drop Arm negativo (tendão íntegro).", "type": "raciocinio"}, {"question": "Paciente feminina, 35 anos, com parestesia nos dedos 1, 2 e 3 da mão direita, piora à noite e ao digitar. Teste de Phalen positivo em 40 segundos. Qual o diagnóstico?", "options": ["Síndrome do túnel do carpo por compressão do nervo mediano; Phalen positivo com parestesia no território mediano confirma o diagnóstico, indicando eletroneuromiografia e medidas conservadoras.", "Neuropatia ulnar no canal de Guyon; os dedos 1 a 3 são inervados pelo ulnar no punho e o Phalen comprime especificamente esse nervo ao fletir o punho.", "Tendinite de De Quervain com compressão reflexa do nervo mediano; a dor dos tendões do polegar irradia parestesia para os dedos 1 a 3 pela proximidade anatômica.", "Radiculopatia cervical em C6-C7; a parestesia nos dedos 1 a 3 tem origem no nível cervical e o Phalen é inespecífico e falso-positivo nesse contexto.", "Síndrome do desfiladeiro torácico com compressão do tronco lateral do plexo braquial; parestesia nos dedos laterais piora com digitação pelo posicionamento dos braços."], "correctIndex": 0, "explanation": "Síndrome do túnel do carpo: nervo MEDIANO comprimido sob o retináculo flexor. Phalen (prece invertida 60 s) → parestesia em dedos 1-3 e metade do 4 = positivo. Piora à noite e ao digitar são clássicos. Ulnar = dedos 4-5. Finkelstein = De Quervain (dor radial, não parestesia). Eletroneuromiografia confirma.", "type": "raciocinio"}, {"question": "Paciente de 40 anos com dor e limitação progressiva no joelho. Ao exame: piparote patelar positivo, McMurray com click na linha articular medial e teste de Lachman negativo. O quadro mais compatível é:", "options": ["Lesão de menisco medial com derrame articular associado; McMurray medial positivo indica menisco medial, piparote confirma derrame volumoso e Lachman negativo indica LCA íntegro.", "Lesão do LCA com derrame reativo; Lachman negativo não exclui lesão aguda e o click de McMurray seria artefato causado pelo edema periarticular abundante.", "Gonartrose grau III com menisco degenerado; o piparote patelar descarta meniscopatia e o click ao McMurray é apenas atrito sinovial sem lesão estrutural real.", "Bursite pré-patelar com irritação meniscal secundária; o derrame confirmado pelo piparote é de origem bursal pré-patelar e o click de McMurray é inespecífico nesse caso.", "Artrite séptica com ruptura meniscal; sinais sistêmicos seriam esperados e o click ao McMurray seria patognomônico de contaminação bacteriana do menisco."], "correctIndex": 0, "explanation": "Interpretação integrada: McMurray com click MEDIAL = menisco MEDIAL lesionado. Piparote patelar positivo = derrame >20 ml. Lachman NEGATIVO = LCA íntegro. Conclusão: meniscopatia medial com derrame reativo, sem lesão ligamentar cruzada. Conduta: RM para confirmar extensão da lesão meniscal.", "type": "raciocinio"}, {"question": "Jovem de 25 anos com dor inguinal ao agachar, subir escadas e rotação interna do quadril. FADIR positivo bilateralmente. Qual o diagnóstico mais provável e qual estrutura está envolvida?", "options": ["Impacto femoroacetabular (IFA); o FADIR comprime o lábio acetabular entre a cabeça femoral e o acetábulo durante flexão, adução e rotação interna, sendo o teste mais específico.", "Tendinite do iliopsoas; o FADIR comprime o tendão iliopsoas contra a espinha ilíaca anterior inferior durante a flexão e rotação, reproduzindo a dor inguinal anterior.", "Artrite da sacroilíaca; o FADIR estressando a articulação sacroilíaca em rotação interna reproduz a dor inguinal típica dessa condição em adultos jovens.", "Bursite trocantérica; o FADIR comprime a bursa trocantérica durante a adução, reproduzindo a dor lateral e inguinal típica da inflamação bursal crônica.", "Síndrome do piriforme; o FADIR estira o músculo piriforme durante rotação interna, comprimindo o nervo ciático e causando dor inguinal com irradiação posterior."], "correctIndex": 0, "explanation": "FADIR positivo (dor na virilha) = Impacto FemorAcetabular (IFA). Mecanismo: flexão + adução + RI do quadril → cabeça femoral choca com borda anterior do acetábulo → comprime lábio acetabular. Comum em jovens e atletas. Diferente do FABER (sacroilíaca), Trendelenburg (glúteo médio) e Ober (trato iliotibial).", "type": "raciocinio"}, {"question": "Homem de 30 anos com lombalgia crônica que melhora com exercício, piora com repouso, rigidez matinal de 1 hora e dor que acorda à noite. Teste de Schober com expansão de 3 cm. Qual diagnóstico deve ser investigado prioritariamente?", "options": ["Espondiloartrite/Espondilite anquilosante; padrão inflamatório clássico com rigidez >30 min, melhora com exercício, piora com repouso, dor noturna e Schober <5 cm.", "Lombalgia mecânica por hipermobilidade lombar; rigidez matinal breve e melhora com exercício são característicos de instabilidade ligamentar sem critério inflamatório.", "Hérnia de disco L4-L5 com radiculopatia crônica; dor noturna e rigidez matinal prolongada são manifestações de compressão radicular crônica por herniação discal.", "Fibromialgia com somatização musculoesquelética; rigidez matinal prolongada e dor noturna sem causa estrutural sugerem síndrome dolorosa funcional com sensibilização central.", "Osteoartrite de coluna lombar grau IV; a rigidez matinal prolongada e Schober reduzido são características da OA avançada com anquilose de facetas articulares."], "correctIndex": 0, "explanation": "Dor inflamatória = MELHORA com exercício + PIORA com repouso + dor noturna + rigidez >30 min + Schober <5 cm → ESPONDILOARTRITE. Espondilite anquilosante: homem jovem, HLA-B27+, acometimento axial. Investigar: radiografia de sacroilíacas, HLA-B27, RMN. OA e hérnia têm padrão mecânico (piora com movimento).", "type": "raciocinio"}, {"question": "No exame de rastreio musculoesquelético em 5 minutos, quais são as 4 regiões avaliadas e as manobras correspondentes?", "options": ["Mãos (prece/prece invertida), ombros (mãos na nuca e nas costas), coluna (tocar o chão + Schober) e joelhos/tornozelos (agachar, andar na ponta e no calcanhar).", "Mãos (Finkelstein + Phalen), ombros (Empty Can + Hawkins), coluna (Lasègue + FABER) e joelhos (Lachman + McMurray), em sequência diagnóstica completa.", "Quadril (Trendelenburg + Thomas), ombros (Apprehension + Drop Arm), coluna (Slump test) e tornozelos (Thompson + gaveta anterior), priorizando grandes articulações.", "Mãos (técnica da tesoura + piparote), ombros (Yergason + Jobe), joelhos (sinal da onda + estresse valgo/varo) e coluna (compressão sacroilíaca + FABER).", "Coluna (Schober + EPE/Lasègue), quadril (FADIR + Ober), joelhos (McMurray + Lachman) e tornozelos (Thompson + inversão estresse), do proximal para o distal."], "correctIndex": 0, "explanation": "Rastreio em 5 min (4 regiões): (1) MÃOS: fechar punho, prece invertida, prece, força de preensão; (2) OMBROS: mãos na nuca (ABD+RE) e nas costas (ADD+RI); (3) COLUNA: tocar o chão + Schober; (4) JOELHOS/TORNOZELOS: agachar e levantar, ponta dos pés, calcanhares. Se NORMAL (sem dor, sem limitação) → articulação normal.", "type": "conteudista"}],"historia_clinica":[{"question": "Qual a porcentagem aproximada dos diagnósticos em reumatologia que pode ser fechada apenas com uma história clínica bem-feita?", "options": ["Aproximadamente 90%, pois as doenças reumáticas são sistêmicas e suas manifestações extra-articulares são detectadas principalmente pela anamnese dirigida e sistemática.", "Aproximadamente 30%, pois a maioria dos diagnósticos reumatológicos requer confirmação com anticorpos específicos e exames de imagem avançados obrigatoriamente.", "Aproximadamente 50%, pois a história orienta o diagnóstico mas os testes imunológicos são indispensáveis para fechar mais da metade dos casos na prática.", "Aproximadamente 70%, pois a história diferencia o padrão inflamatório do mecânico, mas os demais casos precisam de biópsia sinovial para confirmação definitiva.", "Aproximadamente 20%, pois os achados clínicos reumatológicos são inespecíficos e a maioria dos diagnósticos depende de testes moleculares e genéticos específicos."], "correctIndex": 0, "explanation": "~90% dos diagnósticos em reumatologia são fechados apenas com uma história clínica bem-feita. As doenças reumáticas são sistêmicas e podem iniciar com manifestações extra-articulares (AVC no LES/SAF, uveíte nas espondiloartrites, rash cutâneo nas vasculites) que só são detectadas por anamnese dirigida.", "type": "conteudista"}, {"question": "O início súbito de artrite, especialmente monoarticular com sinais flogísticos intensos, deve levantar suspeita imediata de quais condições?", "options": ["Artrite séptica, gota/pseudogota e trauma articular; condições que representam emergências médicas ou situações de alta morbidade exigindo diagnóstico e tratamento imediatos.", "Artrite reumatoide de início agudo, lúpus eritematoso sistêmico e espondiloartrite; doenças crônicas que ocasionalmente apresentam início abrupto sem sinal de alarme.", "Osteoartrite em fase de agudização, bursite reativa e síndrome dolorosa miofascial; condições mecânicas que frequentemente mimetizam artrite inflamatória aguda.", "Fibromialgia de início súbito, síndrome de Sjögren e esclerodermia; condições autoimunes que tipicamente iniciam de forma aguda e monoarticular em jovens.", "Doença de Still do adulto, artrite de Lyme e sarcoidose articular; condições incomuns que devem ser consideradas após exclusão das causas comuns de monoartrite."], "correctIndex": 0, "explanation": "Início SÚBITO de artrite = pensar em EMERGÊNCIAS: artrite séptica (até prova em contrário), gota/pseudogota e trauma. Início GRADUAL = doenças crônicas (AR, LES, espondiloartrites, OA). Essa diferenciação orienta a urgência do atendimento e a investigação inicial.", "type": "conteudista"}, {"question": "Por que a duração de 6 semanas é considerada um marco importante na investigação das artrites?", "options": ["Porque é o critério de duração mínima para classificação de AR pelos critérios ACR/EULAR 2010, diferenciando processos agudos/subagudos de doenças crônicas como AR e espondiloartrites.", "Porque artrites com duração inferior a 6 semanas não requerem investigação laboratorial alguma, enquanto as de maior duração devem ser investigadas com todos os painéis disponíveis.", "Porque abaixo de 6 semanas todos os quadros são considerados virais e tratados empiricamente; acima desse prazo, o diagnóstico de gota torna-se obrigatório por exclusão.", "Porque é o tempo necessário para que anticorpos diagnósticos como FR e anti-CCP atinjam títulos detectáveis nos exames laboratoriais de rotina na maioria dos pacientes.", "Porque infecções articulares bacterianas não sobrevivem por mais de 6 semanas sem tratamento, sendo esse prazo o critério para excluir artrite séptica definitivamente."], "correctIndex": 0, "explanation": "6 semanas: critério de duração mínima para classificação de AR (ACR/EULAR 2010). Abaixo de 6 semanas: pensar em causas agudas/subagudas (parvovírus B19, artrite reativa, gota, séptica, trauma). Acima de 6 semanas: AR, espondiloartrites, LES. O parvovírus pode mimetizar AR inicialmente mas resolve em <6 semanas.", "type": "conteudista"}, {"question": "Qual padrão de envolvimento articular é mais sugestivo de Artrite Reumatoide (AR)?", "options": ["Poliartrite simétrica acometendo MCPs, PIPs e punhos, com poupamento das IFDs, de início gradual e rigidez matinal prolongada (>1 hora).", "Oligoartrite assimétrica de grandes articulações dos membros inferiores com envolvimento axial e sacroilíaco associado em homem jovem com HLA-B27.", "Monoartrite aguda da 1ª articulação metatarsofalângica com dor intensa (10/10), rubor e edema em homem com hiperuricemia e histórico de crises.", "Poliartrite assimétrica com envolvimento das IFDs e dactilite em paciente com placas cutâneas descamativas no couro cabeludo e onicólise.", "Oligoartrite simétrica de grandes articulações com uveíte anterior, úlceras orais dolorosas e eritema nodoso em paciente jovem com DII."], "correctIndex": 0, "explanation": "AR: poliartrite SIMÉTRICA de MCPs + PIPs + punhos, POUPANDO IFDs, início gradual, rigidez matinal >1h, predomínio em mulheres de meia-idade. OA = IFDs (Heberden) + IFPs (Bouchard). Espondiloartrite = oligoartrite assimétrica de MMII + axial. Psoriásica = IFDs + dactilite + psoríase. Gota = 1ª MTP aguda.", "type": "conteudista"}, {"question": "A dactilite ('dedo em salsicha') é caracterizada pelo edema difuso e uniforme de todo o dedo. Em quais doenças é mais característica?", "options": ["Artrite psoriásica e espondiloartrites (incluindo artrite reativa), onde a inflamação articular combinada com tenossinovite severa resulta em edema difuso de todo o dedo.", "Artrite reumatoide e lúpus eritematoso sistêmico, onde o edema sinovial das MCPs e PIPs estende-se para os tecidos periarticulares causando aspecto de salsicha.", "Osteoartrite e gota, onde o acúmulo de cristais nas articulações interfalangeanas causa inflamação difusa do dedo com eritema intenso e edema frio.", "Síndrome de Sjögren e esclerodermia, onde a fibrose periarticular e o fenômeno de Raynaud causam edema difuso e progressivo dos dedos com endurecimento.", "Fibromialgia e artralgia por hipermobilidade, onde a dor difusa dos dedos pode ser confundida clinicamente com o edema da dactilite verdadeira na avaliação."], "correctIndex": 0, "explanation": "Dactilite ('dedo em salsicha'): edema difuso de todo o dedo por artrite + tenossinovite. Clássica das ESPONDILOARTRITES: artrite psoriásica (PsA), artrite reativa (ReA), espondilite anquilosante. Também ocorre em artrite por cristais. Na AR, o edema é articular (MCPs/PIPs), não difuso como na dactilite.", "type": "conteudista"}, {"question": "Qual a interpretação correta da rigidez matinal de acordo com a sua duração em reumatologia?", "options": [">30-60 min sugere artrite inflamatória (AR, espondiloartrites); <15-30 min sugere osteoartrite (mecânico); ausência de rigidez é compatível com periarticular (tendinite, bursite, fibromialgia).", ">15 min sugere processo mecânico; <60 min sugere processo inflamatório; ausência de rigidez indica doença sistêmica grave como vasculite ou LES em fase ativa.", ">60 min é diagnóstico exclusivo de espondilite anquilosante; 30-60 min é diagnóstico de AR; <30 min exclui qualquer processo inflamatório articular.", "A duração da rigidez matinal não tem valor diagnóstico isolado, sendo útil apenas quando combinada com parâmetros laboratoriais como VHS e PCR elevados.", ">2 horas indica LES obrigatoriamente; 1-2 horas indica AR definitivamente; <1 hora indica espondiloartrite com envolvimento predominantemente axial."], "correctIndex": 0, "explanation": "Rigidez matinal: >30-60 min = INFLAMATÓRIO (AR, espondiloartrites); <15-30 min = MECÂNICO (osteoartrite); ausência = periarticular (tendinite, bursite) ou fibromialgia. A duração é o PRINCIPAL divisor. Importante: rigidez é sintoma, não diagnóstico — um mesmo corte de 30 min orienta, mas não confirma sozinho.", "type": "conteudista"}, {"question": "Qual afirmação está correta sobre o padrão de simetria nas doenças reumáticas?", "options": ["AR e LES tipicamente apresentam artrite simétrica; espondiloartrites geralmente são assimétricas; a artrite psoriásica pode apresentar ambos os padrões, mimetizando a AR.", "Todas as espondiloartrites são obrigatoriamente assimétricas, nunca apresentando padrão simétrico em nenhuma fase da evolução da doença.", "A AR apresenta padrão assimétrico nas fases iniciais e simétrico apenas nas fases tardias, quando o acometimento bilateral está estabelecido cronicamente.", "O LES apresenta artrite assimétrica na maioria dos casos, pois o processo autoimune tende a afetar articulações de forma aleatória e não espelhada.", "A simetria não tem valor diagnóstico nas doenças reumáticas, pois todas as condições inflamatórias podem apresentar-se de forma simétrica ou assimétrica."], "correctIndex": 0, "explanation": "Simétrica: AR, LES. Assimétrica: espondiloartrites (psoriásica, reativa, anquilosante). EXCEÇÃO IMPORTANTE: artrite psoriásica (PsA) pode ser simétrica (mimetizando AR) ou assimétrica. Por isso, psoríase + artrite simétrica não exclui PsA. A simetria é um guia rápido, não absoluto.", "type": "conteudista"}, {"question": "Paciente com artrite reumatoide em uso de metotrexato e prednisona apresenta joelho direito quente, edematoso, com rubor e febre de 38,5°C. Qual deve ser a primeira hipótese diagnóstica?", "options": ["Artrite séptica, que deve ser descartada até prova em contrário em todo paciente imunossuprimido com monoartrite aguda febril com sinais flogísticos, sendo emergência médica.", "Osteonecrose avascular do côndilo femoral, pois o uso de corticosteroides pela AR pode causar necrose isquêmica com apresentação monoarticular aguda e febre.", "Agudização focal da AR no joelho, pois exacerbações focais são comuns sob imunossupressão e o joelho é a articulação mais frequentemente acometida nessa situação.", "Pseudogota (artrite por pirofosfato de cálcio), pois pacientes com AR têm maior prevalência de depósitos de cristais nas articulações grandes, especialmente o joelho.", "Trombose venosa profunda com artrite reativa associada, pois pacientes imunossuprimidos têm maior risco tromboembólico e o edema pode ser confundido com artrite."], "correctIndex": 0, "explanation": "ALERTA VERMELHO: paciente com AR (ou LES) que desenvolve monoartrite aguda com calor, rubor e febre = ARTRITE SÉPTICA até prova em contrário. Imunossupressores mascaram infecção. Conduta: artrocentese urgente com análise do líquido sinovial (celularidade, gram, cultura) + antibioticoterapia empírica.", "type": "raciocinio"}, {"question": "Qual sintoma da revisão de sistemas 'head-to-toe' deve orientar o clínico para suspeita de Síndrome do Anticorpo Antifosfolípide (SAF)?", "options": ["Abortos de repetição e tromboses prévias (arteriais ou venosas), manifestações obstétricas e vasculares características da SAF, frequentemente associada ao LES.", "Xeroftalmia e xerostomia (olho e boca secos), manifestações típicas da Síndrome de Sjögren pelo acometimento autoimune das glândulas exócrinas.", "Diarreia crônica, sangue nas fezes e disfagia, sugerindo acometimento gastrointestinal por esclerodermia ou artrite associada à doença inflamatória intestinal.", "Urina espumosa e hematúria, manifestações renais sugestivas de nefrite lúpica com acometimento glomerular e indicação de biópsia renal para estadiamento.", "Púrpura palpável em membros inferiores e úlceras isquêmicas, manifestações cutâneas características das vasculites sistêmicas de pequenos vasos."], "correctIndex": 0, "explanation": "SAF (Síndrome do Anticorpo Antifosfolípide): abortos de repetição + tromboses (arteriais/venosas). Perguntar: 'Já teve aborto? Já teve trombose, AVC ou TEP?' SAF pode ser primária ou secundária ao LES. Diferente: Sjögren = xero (olho/boca); Esclerodermia = CREST; Vasculites = púrpura palpável.", "type": "conteudista"}, {"question": "O rash malar ('asa de borboleta') é característico do LES. Qual a descrição clínica correta e como diferenciá-lo de outras lesões faciais?", "options": ["Eritema fixo nas proeminências malares e dorso do nariz, poupando os sulcos nasolabiais; fotossensível e persistente, diferente do eritema facial transitório da rosácea.", "Eritema violáceo periorbitário com edema palpebral bilateral ('heliotropo'), acometendo pálpebras superiores e associado à fraqueza muscular proximal na dermatomiosite.", "Placas eritematosas com escamas prateadas espessas na face, couro cabeludo e cotovelos, com fenômeno de Köbner e envolvimento ungueal típico da psoríase.", "Eritema migratório em formato de alvo com clareamento central, irradiando progressivamente da região malar após picada de carrapato na doença de Lyme disseminada.", "Eritema nodoso com nódulos subcutâneos dolorosos na face e membros, associado a sarcoidose, infecções bacterianas e doenças inflamatórias intestinais."], "correctIndex": 0, "explanation": "Rash malar LES: eritema fixo nas maçãs do rosto e dorso do nariz, POUPA sulcos nasolabiais, fotossensível. Heliotropo (periorbitário) = dermatomiosite. Psoríase = placas com escamas. Eritema migratório = Lyme. Eritema nodoso = paniculite. O sulco nasolabial poupado é o detalhe clínico diferenciador do LES.", "type": "conteudista"}, {"question": "Quais são as três fases do fenômeno de Raynaud em ordem cronológica durante um episódio?", "options": ["Palidez (isquemia por vasoespasmo) → cianose (hipóxia por estase vascular) → rubor (reperfusão com vasodilatação reativa), desencadeado por frio ou estresse.", "Rubor inicial (vasodilatação reflexa) → cianose (estase venosa progressiva) → palidez (isquemia por colapso vascular), em resposta a estímulos térmicos externos.", "Cianose (hipóxia por vasoconstrição periférica) → palidez (isquemia por oclusão microvascular) → rubor (reperfusão parcial), mais frequente no verão.", "Eritema (inflamação vasomotora local) → edema (transudato inflamatório periarticular) → palidez (anemia local por sequestro eritrocitário), mediado por prostaglandinas.", "Palidez e rubor alternantes sem fase de cianose, desencadeado principalmente por mudanças posturais e não por variação de temperatura ambiental."], "correctIndex": 0, "explanation": "Raynaud: (1) PALIDEZ = vasoespasmo → isquemia; (2) CIANOSE = estase + hipóxia; (3) RUBOR = reperfusão com vasodilatação reativa. Gatilho: frio ou estresse. A sequência tricolor (branco → azul → vermelho) é clássica. Pergunta-chave: 'Suas mãos ficam pálidas, azuis ou doloridas no frio?'", "type": "conteudista"}, {"question": "Quais características distinguem o fenômeno de Raynaud secundário do primário?", "options": ["O secundário associa-se a doenças como LES, esclerodermia e vasculites, apresentando sinais de alarme como úlceras digitais, calcinose e telangiectasias; o primário é benigno, simétrico e sem lesão tecidual.", "O primário ocorre exclusivamente em homens idosos com aterosclerose; o secundário acomete mulheres jovens sem doença de base, sendo benigno e reversível com aquecimento.", "O secundário é exclusivo do lúpus eritematoso sistêmico; qualquer outra associação indica Raynaud primário com comorbidade não relacionada à autoimunidade.", "O primário apresenta úlceras digitais e necrose isquêmica progressiva; o secundário é benigno, sem lesão tecidual e responde completamente ao aquecimento local.", "A distinção entre primário e secundário é baseada exclusivamente em testes laboratoriais como FAN e anticorpos específicos, sendo clinicamente impossível diferenciá-los."], "correctIndex": 0, "explanation": "Raynaud PRIMÁRIO: benigno, simétrico, jovens/mulheres, sem doença de base, sem lesão digital. Raynaud SECUNDÁRIO: associado a LES, esclerodermia (CREST), vasculites, síndrome do túnel do carpo. SINAIS DE ALARME (secundário): úlceras digitais, calcinose, telangiectasias, FAN positivo, início tardio ou assimétrico.", "type": "conteudista"}, {"question": "Na revisão de sistemas, a presença de úlceras orais de repetição pode sugerir LES ou doença de Behçet. Como diferenciá-las clinicamente?", "options": ["No LES as úlceras são indolores (mucosa oral e nasofaringe); no Behçet são dolorosas e associam-se a úlceras genitais dolorosas e uveíte, formando a tríade clássica.", "No LES as úlceras são dolorosas e de grande tamanho; no Behçet são indolores e únicas, sem associação com úlceras genitais ou manifestações oculares inflamatórias.", "No LES as úlceras surgem exclusivamente na língua; no Behçet ocorrem apenas na mucosa jugal bilateral, sendo a localização o único critério diferenciador.", "As úlceras do LES são hemorrágicas por vasculite de pequenos vasos; as do Behçet são aftosas, esbranquiçadas e rodeadas por halo eritematoso típico.", "Não há diferença clínica entre as úlceras do LES e do Behçet, sendo a distinção feita exclusivamente por biópsia com imunohistoquímica e tipagem HLA-B51."], "correctIndex": 0, "explanation": "Úlceras orais: LES = INDOLORES (nasofaringe, palato); Behçet = DOLOROSAS + úlceras genitais dolorosas + uveíte (tríade de Behçet). Dica clínica: perguntar 'dói a ferida na boca?' — se não: LES; se dói intensamente com recorrência e lesão genital: Behçet. HLA-B51 associa-se ao Behçet.", "type": "conteudista"}, {"question": "Ao suspeitar de LES em uma paciente jovem, quais são as perguntas-chave da correlação histórica dirigida?", "options": ["Fotossensibilidade, rash malar, úlceras orais indolores, alopecia, fenômeno de Raynaud, dor pleurítica, abortos de repetição, convulsões ou psicose e urina espumosa.", "Dor lombar inflamatória, uveíte, psoríase de couro cabeludo, diarreia crônica, uretrite e tendinite de Aquiles, buscando critérios de espondiloartrite com envolvimento axial.", "Xerostomia, xeroftalmia, fadiga crônica, parotidite recorrente e poliartralgia leve de pequenas articulações, caracterizando Síndrome de Sjögren primária.", "Disfagia, Raynaud, esclerodactilia, telangiectasias faciais e calcinose subcutânea nos dedos, configurando a síndrome CREST da esclerose sistêmica limitada.", "Dispneia progressiva, tosse seca, fibrose pulmonar, fraqueza proximal e disfagia, sugerindo miosite inflamatória com doença pulmonar intersticial associada."], "correctIndex": 0, "explanation": "Correlação histórica para LES: fotossensibilidade, rash malar (asa de borboleta), úlceras orais INDOLORES, alopecia, Raynaud, pleurite, abortos de repetição (SAF associada), manifestações neuropsiquiátricas (convulsões/psicose) e nefrite (urina espumosa/hematúria). Perguntas dirigidas aumentam a sensibilidade diagnóstica.", "type": "conteudista"}, {"question": "Qual das apresentações de caso clínico é considerada uma 'boa apresentação' em reumatologia?", "options": ["'Paciente com poliartrite simétrica de MCPs e punhos, rigidez matinal de 2h, há 10 semanas, sem febre ou rash', com diagnóstico diferencial estruturado e AR como hipótese principal.", "'Paciente com dor nas juntas há meses, com cansaço e algumas manchas na pele', seguida de listagem extensa de todos os diagnósticos possíveis sem hierarquização.", "'Paciente com artralgia difusa e fadiga de causa a esclarecer', com solicitação imediata de FAN, FR e anti-CCP para guiar o diagnóstico sem hipótese prévia estruturada.", "'Paciente com artrite de provável etiologia autoimune sem diagnóstico definido', com solicitação de biópsia sinovial como primeiro passo antes de qualquer hipótese clínica.", "'Paciente com poliartrite há meses sem diagnóstico', com encaminhamento imediato para reumatologista sem lista de problemas ou diagnósticos diferenciais formulados."], "correctIndex": 0, "explanation": "Boa apresentação: (1) Impressão em 1-2 frases com dados objetivos; (2) Lista de problemas; (3) DDx estruturado e hierarquizado; (4) Plano inicial. Exemplo correto: 'Poliartrite simétrica de MCPs/punhos, rigidez 2h, 10 semanas' → AR (mais provável), LES (possível), parvovírus (improvável, >6 semanas).", "type": "conteudista"}, {"question": "Homem de 55 anos apresenta dor intensa (10/10), edema e rubor na 1ª articulação metatarsofalângica (podagra) há 6 horas, após churrasco com cerveja na véspera. Qual o diagnóstico mais provável e os fatores de risco presentes?", "options": ["Gota aguda (artrite gotosa); fatores de risco: consumo de álcool e carne vermelha (aumentam uricemia); diagnóstico diferencial inclui artrite séptica, pseudogota e trauma.", "Artrite séptica da 1ª MTP; fatores de risco: uso de diuréticos e histórico de cirurgia prévia no pé; diagnóstico diferencial inclui gota, pseudogota e artrite reativa.", "Artrite psoriásica aguda da 1ª MTP; fatores de risco: consumo de álcool e psoríase cutânea prévia não diagnosticada; diagnóstico diferencial inclui gota e artrite reativa.", "Artrite reativa pós-infecciosa da 1ª MTP; fatores de risco: possível infecção gastrointestinal pela carne e HLA-B27 positivo; diagnóstico diferencial inclui gota e trauma.", "Pseudogota (artrite por pirofosfato de cálcio) da 1ª MTP; fatores de risco: idade avançada e hiperuricemia; diagnóstico diferencial inclui gota, séptica e osteoartrite."], "correctIndex": 0, "explanation": "Podagra clássica da GOTA: homem >40 anos, 1ª MTP, dor 10/10, início súbito, pós-álcool e carne vermelha (hiperuricemia). DDx obrigatório: artrite séptica (excluir com artrocentese se dúvida). Perguntar: ataques prévios, cálculo renal, diuréticos. Pseudogota acomete grandes articulações (joelho), não tipicamente a 1ª MTP.", "type": "raciocinio"}, {"question": "Mulher de 28 anos com poliartrite de punhos e MCPs há 8 semanas, fadiga intensa, queda de cabelo, úlceras na boca que não doem e sensibilidade ao sol. Rigidez matinal de 90 minutos. Qual diagnóstico é mais provável?", "options": ["LES (Lúpus Eritematoso Sistêmico); combinação de poliartrite simétrica, alopecia, úlceras orais INDOLORES e fotossensibilidade em mulher jovem é altamente sugestiva, solicitar FAN e anti-DNA.", "Artrite reumatoide inicial; poliartrite simétrica de MCPs e punhos com rigidez matinal prolongada em mulher jovem é padrão típico da AR, sem envolvimento de pele e mucosas.", "Artrite por parvovírus B19; fadiga intensa e poliartrite simétrica de pequenas articulações em mulher jovem com manifestações cutâneas sugerem infecção viral recente.", "Síndrome de Sjögren primária; poliartralgia, fadiga e manifestações mucosas em mulher jovem são típicas do Sjögren, pesquisar anti-Ro e anti-La como primeira investigação.", "Dermatomiosite juvenil tardia; poliartrite proximal, fadiga e manifestações cutâneas em mulher jovem sugerem miopatia inflamatória com artrite e fotossensibilidade."], "correctIndex": 0, "explanation": "LES: mulher jovem + poliartrite simétrica + alopecia + úlceras INDOLORES + fotossensibilidade + rigidez matinal >1h + duração >6 semanas. Investigação inicial: FAN, anti-DNA, complemento (C3/C4), urina I (nefrite lúpica?), hemograma, FR, anti-CCP (excluir AR). Parvovírus resolve <6 semanas.", "type": "raciocinio"}, {"question": "Para uma paciente com poliartrite simétrica de MCPs e punhos com rigidez matinal de 2 horas há 10 semanas, qual plano inicial de investigação é mais adequado?", "options": ["Solicitar fator reumatoide (FR), anti-CCP, VHS, PCR e FAN, pois auxiliam na confirmação diagnóstica e no diagnóstico diferencial entre AR e LES na poliartrite inflamatória.", "Solicitar apenas hemograma completo e proteína C reativa, pois são suficientes para confirmar o processo inflamatório e iniciar tratamento empírico com AINEs sem demora.", "Solicitar ácido úrico, urina de 24h para creatinina e complemento sérico, pois a poliartrite com rigidez matinal prolongada deve ser investigada primariamente para hiperuricemia.", "Solicitar apenas radiografias das mãos, pés e pelve para avaliar erosões ósseas precoces, pois o diagnóstico de AR é exclusivamente radiológico e não laboratorial inicialmente.", "Solicitar HLA-B27, radiografia de sacroilíacas e ressonância magnética de coluna lombar, pois a rigidez matinal prolongada em mulher jovem deve sugerir espondilite anquilosante."], "correctIndex": 0, "explanation": "Investigação inicial da poliartrite simétrica: FR (positivo em 70-80% da AR), anti-CCP (alta especificidade para AR), VHS/PCR (inflamação), FAN (excluir LES). Anti-CCP é mais específico que FR. Radiografias de mãos: buscar erosões precoces. HLA-B27 = espondiloartrites (axial). Ácido úrico = gota.", "type": "conteudista"}, {"question": "Paciente com oligoartrite assimétrica de membros inferiores, olho vermelho recorrente (uveíte) e histórico de diarreia intensa há 3 semanas. Qual diagnóstico o fluxograma diagnóstico sugere?", "options": ["Artrite reativa (síndrome de Reiter); tríade de oligoartrite assimétrica de MMII, uveíte e infecção prévia (gastrointestinal aqui) é padrão característico da espondiloartrite reativa.", "Artrite reumatoide com manifestações extra-articulares; olho vermelho pode ser epiesclerite da AR e diarreia seria manifestação gastrointestinal do metotrexato utilizado.", "Gota poliarticular com deposição de cristais; oligoartrite assimétrica de MMII após episódio gastrointestinal pode indicar hiperuricemia reativa com manifestação ocular associada.", "Lúpus eritematoso sistêmico com serosite; diarreia, olho vermelho e oligoartrite em conjunto são manifestações da peritonite lúpica com acometimento multissistêmico.", "Doença de Still do adulto; oligoartrite assimétrica, uveíte e diarreia acompanhados de febre quotidiana e rash evanescente salmão são critérios diagnósticos da doença."], "correctIndex": 0, "explanation": "Artrite REATIVA: oligoartrite assimétrica de MMII + uveíte + infecção prévia (GI ou genitourinária) = tríade clássica. Antes chamada síndrome de Reiter. Espondiloartrite reativa pós-infecciosa (salmonela, campylobacter, shigella, chlamydia). HLA-B27 frequentemente positivo. Diferenciar de AR (simétrica, pequenas articulações).", "type": "raciocinio"}, {"question": "Qual padrão de envolvimento articular é mais sugestivo de Espondilite Anquilosante?", "options": ["Dor axial inflamatória (coluna + sacroilíacas) em homem jovem com HLA-B27 positivo, melhora com exercício, piora com repouso e rigidez matinal >30 minutos.", "Poliartrite simétrica de pequenas articulações das mãos com rigidez matinal e acometimento axial tardio em mulher de meia-idade HLA-B27 negativa.", "Monoartrite aguda do joelho com derrame articular em atleta jovem, associada à dor lombar mecânica que piora com exercício e melhora com repouso.", "Oligoartrite assimétrica das mãos com dactilite e lesões ungueais em paciente com psoríase cutânea prévia e envolvimento sacroilíaco unilateral assimétrico.", "Artrite do joelho com calcificações meniscais e cartilaginosas, associada à rigidez matinal curta e acometimento axial em paciente com hipotireoidismo."], "correctIndex": 0, "explanation": "Espondilite anquilosante: homem jovem (<40 anos), dor AXIAL inflamatória (sacroilíacas + coluna), melhora com EXERCÍCIO, piora com REPOUSO, rigidez matinal >30 min, HLA-B27+ (90%), uveíte anterior. OA axial = mecânica (piora com movimento). PsA = oligoartrite assimétrica + psoríase. AR = perifério simétrico.", "type": "conteudista"}, {"question": "Paciente com artrite reumatoide em uso de corticoterapia prolongada desenvolve dor aguda intensa no quadril. Além de artrite séptica, qual outra condição grave deve ser considerada?", "options": ["Osteonecrose avascular da cabeça femoral (necrose isquêmica), complicação do uso prolongado de corticosteroides, com diagnóstico precoce por ressonância magnética.", "Gota secundária à corticoterapia, pois os corticosteroides inibem a excreção renal de ácido úrico causando hiperuricemia e deposição de cristais no quadril.", "Artrite de Lyme distal com acometimento do quadril, pois pacientes com AR imunossuprimidos são mais suscetíveis a infecções por Borrelia burgdorferi.", "Síndrome compartimental aguda do quadril, pois o edema muscular periarticular induzido pelos corticosteroides eleva a pressão intracompartimental rapidamente.", "Bursite trocantérica aguda por ruptura tendínea, pois o uso crônico de corticosteroides enfraquece os tendões periarticulares do quadril aumentando o risco de bursite."], "correctIndex": 0, "explanation": "Osteonecrose avascular: complicação clássica do uso prolongado de CORTICOSTEROIDES. Dor aguda no quadril em paciente com AR = artrite séptica (1ª hipótese) + OSTEONECROSE (2ª hipótese). RMN é o gold standard para diagnóstico precoce da osteonecrose antes das alterações radiográficas.", "type": "raciocinio"}, {"question": "A secura ocular (xeroftalmia) e a secura de boca (xerostomia) como sintomas reumatológicos devem levantar suspeita de qual doença?", "options": ["Síndrome de Sjögren, autoimunidade contra as glândulas exócrinas (salivares e lacrimais), que pode ser primária ou secundária associada à AR ou ao LES.", "Esclerose sistêmica (esclerodermia), onde a fibrose progressiva das glândulas exócrinas causa redução gradual das secreções lacrimais e salivares ao longo do tempo.", "Lúpus eritematoso sistêmico isolado, que causa nefrite lúpica com síndrome nefrótica gerando edema secundário das glândulas lacrimais com diminuição da secreção.", "Granulomatose com poliangiite (Wegener), que acomete as glândulas lacrimais e salivares com granulomas inflamatórios destrutivos causando secura progressiva.", "Artrite reumatoide com manifestações extra-articulares exclusivas, onde a inflamação sinovial sistêmica acomete as glândulas salivares e lacrimais sem outra doença."], "correctIndex": 0, "explanation": "SÍNDROME DE SJÖGREN: xeroftalmia (olho seco) + xerostomia (boca seca) por autoimunidade contra glândulas exócrinas. Anticorpos: anti-Ro (SS-A) e anti-La (SS-B). Sjögren PRIMÁRIO: isolado. Sjögren SECUNDÁRIO: associado à AR, LES, esclerodermia. Também causa poliartralgia/artrite leve e fadiga.", "type": "conteudista"}, {"question": "Paciente com fenômeno de Raynaud apresenta úlceras digitais nas pontas dos dedos e telangiectasias na face. Isso indica Raynaud:", "options": ["Secundário a doença sistêmica, provavelmente esclerodermia (síndrome CREST); úlceras digitais, calcinose e telangiectasias são sinais de alarme de lesão vascular e doença de base.", "Primário benigno sem doença de base; úlceras digitais e telangiectasias são complicações do espasmo vascular repetido sem implicar doença autoimune subjacente.", "Secundário à hipertensão arterial não controlada; hipertensão causa vasoconstrição periférica grave com úlceras isquêmicas digitais e telangiectasias por pressão microvascular.", "Primário com progressão para doença arterial periférica aterosclerótica; úlceras digitais indicam obstrução aterosclerótica sem doença autoimune sistêmica.", "Secundário a síndrome do túnel do carpo bilateral, onde a compressão do nervo mediano causa vasoconstrição reflexa com necrose digital progressiva e telangiectasias."], "correctIndex": 0, "explanation": "SINAIS DE ALARME no Raynaud = SECUNDÁRIO: úlceras digitais, calcinose, telangiectasias, FAN positivo, anticorpos específicos, assimetria, início tardio. A combinação telangiectasias + úlceras digitais + Raynaud = síndrome CREST (esclerodermia limitada). Raynaud primário: jovem, benigno, SEM lesão tecidual.", "type": "raciocinio"}, {"question": "Uma poliartrite é definida pelo acometimento simultâneo de quantas articulações?", "options": ["Mais de 4 articulações afetadas; a poliartrite inclui AR, LES, artrite por cristais poliarticular e osteoartrite generalizada como diagnósticos diferenciais principais.", "De 2 a 4 articulações afetadas; esse padrão é chamado oligoartrite e inclui artrite reativa, psoriásica e espondiloartrites em suas formas periféricas.", "Apenas 1 articulação afetada; a poliartrite refere-se ao acometimento inflamatório de qualquer articulação em doenças autoimunes sistêmicas.", "Mais de 6 articulações afetadas; abaixo desse número o quadro é classificado como oligoartrite e não atinge o critério numérico de poliartrite.", "Mais de 10 articulações afetadas simultaneamente; esse é o critério numérico dos critérios ACR/EULAR 2010 para classificação de AR grave poliarticular."], "correctIndex": 0, "explanation": "Classificação por número de articulações: MONO (1) = emergência médica (séptica, gota, trauma); OLIGO (2-4) = artrite reativa, psoriásica, espondiloartrites; POLI (>4) = AR, LES, gota poliarticular, OA generalizada. Essa classificação é o PRIMEIRO passo do diagnóstico diferencial em qualquer artrite.", "type": "conteudista"}, {"question": "Qual dos diagnósticos deve ser considerado emergência médica em qualquer apresentação de monoartrite aguda com articulação quente, edema e dor intensa?", "options": ["Artrite séptica, pois pode evoluir rapidamente para destruição articular e sepse com alta mortalidade; requer artrocentese urgente e antibioticoterapia imediata.", "Gota aguda, pois cristais de urato podem causar destruição articular rápida e devem ser tratados com colchicina em doses altas para evitar cronificação.", "Artrite reativa, pois a infecção bacteriana subjacente pode evoluir para sepse sistêmica se não tratada com antibióticos de amplo espectro de imediato.", "Lúpus eritematoso sistêmico em crise, pois uma crise lúpica monoarticular pode evoluir para vasculite com trombose arterial e perda do membro afetado.", "Osteoartrite agudizada, pois o edema sinovial intenso pode causar síndrome compartimental articular com necrose avascular da cartilagem hialina."], "correctIndex": 0, "explanation": "ARTRITE SÉPTICA = emergência médica. Qualquer monoartrite aguda com sinais flogísticos intensos = SÉPTICA até prova em contrário. Artrocentese URGENTE: contagem de leucócitos (>50.000/mm³ = séptica), gram, cultura. Alta mortalidade se tratamento tardio. Gota e pseudo-gota: também agudas, mas menos destrutivas.", "type": "conteudista"}, {"question": "Ao suspeitar de espondiloartrite em paciente com dor lombar crônica, quais perguntas específicas devem ser feitas na correlação histórica dirigida?", "options": ["Melhora com exercício (não repouso), uveíte (olho vermelho), psoríase, diarreia ou uretrite prévia, tendinite de Aquiles ou fascite plantar e doença inflamatória intestinal.", "Fotossensibilidade, rash facial malar, alopecia, úlceras orais indolores, abortos de repetição e urina espumosa, buscando critérios de LES com acometimento axial.", "Xerostomia, xeroftalmia, fadiga extrema, parotidite recorrente e poliartralgia de pequenas articulações, buscando Sjögren com manifestação axial associada.", "Disfagia, Raynaud progressivo, espessamento cutâneo, telangiectasias faciais e dispneia aos esforços, buscando esclerodermia com manifestação vertebral.", "Fraqueza muscular proximal, mialgia difusa, rash heliotropo palpebral, disfagia e sinal de Gottron nas mãos, buscando dermatomiosite com acometimento lombar."], "correctIndex": 0, "explanation": "Correlação histórica para ESPONDILOARTRITE: (1) Dor lombar INFLAMATÓRIA (melhora com exercício); (2) Uveíte; (3) Psoríase (AP); (4) Diarreia/uretrite prévia (artrite reativa); (5) Tendinite de Aquiles/fascite plantar (entesites); (6) DII (Crohn, RCU). Perguntar especificamente por cada item aumenta a sensibilidade diagnóstica.", "type": "conteudista"}, {"question": "A púrpura palpável em membros inferiores que NÃO desaparece à digitopressão é sinal clínico característico de qual condição?", "options": ["Vasculite cutânea de pequenos vasos; lesões eritemato-violáceas elevadas ao toque que não desaparecem à digitopressão, diferente do eritema por vasodilatação.", "Eritema nodoso das espondiloartrites; nódulos subcutâneos dolorosos que desaparecem à digitopressão e são mais frequentes na face anterior das pernas.", "Rash lúpico com envolvimento de membros inferiores; eritema fotossensível que se estende abaixo dos joelhos em casos de LES com manifestação cutânea atípica.", "Petéquias por trombocitopenia da AR; lesões punctiformes que desaparecem parcialmente à digitopressão e são causadas por fragilidade capilar periférica.", "Livedo reticular da SAF; padrão rendilhado violáceo de membros inferiores que desaparece ao aquecimento local e indica vasoespasmo mediado por anticorpos antifosfolípides."], "correctIndex": 0, "explanation": "Púrpura palpável NÃO DESAPARECE à digitopressão = VASCULITE CUTÂNEA de pequenos vasos (extravasamento de hemácias para a derme). Diferente do eritema/enantema que desaparece (vasodilatação). Perguntar sobre causas: infecção, LES, AR, crioglobulinemia. Eritema nodoso = desaparece à digitopressão.", "type": "conteudista"}, {"question": "Paciente com oligoartrite assimétrica das mãos, dactilite do 3º dedo esquerdo e onicólise. Qual diagnóstico é mais provável e o que deve ser investigado na anamnese?", "options": ["Artrite psoriásica; investigar psoríase cutânea (placas no couro cabeludo, cotovelos, umbigo), histórico familiar de psoríase e lesões ungueais prévias como onicólise.", "Artrite reumatoide seronegativa; oligoartrite assimétrica com onicólise deve ser investigada com FR, anti-CCP e radiografia das mãos para erosões precoces.", "Gota poliarticular crônica; dactilite e onicólise são manifestações do depósito de cristais de urato nos dedos, devendo-se dosar ácido úrico sérico com urgência.", "Artrite reativa pós-infecciosa; dactilite e onicólise após infecção gastrointestinal ou urogenital são características da artrite de Reiter com acometimento ungueal.", "Esclerodermia de início articular; onicólise e edema difuso do dedo são manifestações precoces antes do espessamento cutâneo progressivo estabelecido."], "correctIndex": 0, "explanation": "Artrite PSORIÁSICA (AP): oligoartrite ASSIMÉTRICA + dactilite + onicólise (descolamento ungueal). Perguntar: psoríase cutânea (pode ser oculta no couro cabeludo, umbigo, região interglútea), histórico familiar. Até 30% da AP não tem psoríase visível na apresentação. Diferente da AR (simétrica, sem dactilite nem onicólise).", "type": "raciocinio"}, {"question": "Mulher de 45 anos, previamente hígida, com poliartrite simétrica de punhos e MCPs de início gradual, rigidez matinal de 2 horas há 10 semanas. Qual é o diagnóstico mais provável e por quê atende aos critérios?", "options": ["Artrite reumatoide inicial; poliartrite simétrica de MCPs/punhos (poupando IFDs), rigidez >1h e duração >6 semanas atendem aos critérios de classificação ACR/EULAR 2010.", "LES com manifestação articular predominante; poliartrite simétrica de início gradual em mulher de meia-idade com rigidez matinal longa é mais típica do lúpus do que da AR.", "Espondiloartrite com envolvimento periférico; poliartrite simétrica de pequenas articulações é a forma de apresentação mais comum da espondilite anquilosante em mulheres.", "Osteoartrite erosiva de rápida progressão; simetria e envolvimento de MCPs/punhos em mulher de meia-idade são característicos da OA erosiva associada ao climatério.", "Artrite viral por parvovírus B19; poliartrite simétrica de MCPs/punhos em mulher com rigidez matinal sugere artrite viral mesmo com duração superior a 6 semanas."], "correctIndex": 0, "explanation": "AR: (1) Poliartrite SIMÉTRICA de MCPs + PIPs + punhos, poupando IFDs; (2) Rigidez matinal >1h; (3) Duração >6 SEMANAS — esses três aspectos atendem ao critério temporal do ACR/EULAR 2010. Mulher meia-idade é o perfil epidemiológico típico. Parvovírus: dura <6 semanas. OA: poupa MCPs e punhos.", "type": "raciocinio"}, {"question": "Quais são os 3 pilares da história reumatológica e o que cada um avalia?", "options": ["Análise da dor articular (10 passos para caracterizar o processo inflamatório vs mecânico), revisão de sistemas head-to-toe (caráter sistêmico da doença) e correlação histórica (reconhecer padrões para fechar o diagnóstico diferencial).", "Exame físico articular detalhado (palpação e ADM), solicitação de anticorpos específicos (FR, anti-CCP, FAN) e correlação com imagens radiológicas (erosões e calcificações).", "Anamnese familiar (histórico genético), revisão de medicamentos em uso (indutores de autoimunidade) e correlação laboratorial (VHS, PCR, hemograma completo).", "Queixa principal com localização articular, história da doença atual com cronologia e exame físico geral com aferição de sinais vitais e avaliação nutricional.", "Identificação do padrão articular (mono/oligo/poli), solicitação de imagens (radiografia e RMN) e encaminhamento para reumatologista especializado para diagnóstico definitivo."], "correctIndex": 0, "explanation": "Os 3 pilares da história reumatológica: (1) ANÁLISE DA DOR ARTICULAR: 10 passos (início, duração, padrão, simetria, número, sintomas associados, constitucionais, incapacidade, fatores melhora/piora, revisão de sistemas); (2) REVISÃO DE SISTEMAS head-to-toe: identificar manifestações extra-articulares sistêmicas; (3) CORRELAÇÃO HISTÓRICA: perguntar pelos sintomas da doença suspeita para fechar o diagnóstico.", "type": "conteudista"}]};

let selectedModule=null,questions=[],currentIndex=0,score=0,userAnswers=[],questionShuffleMaps=[],selectedOption=null,answered=false,currentStreak=0,maxStreak=0,quizMode='seq';
