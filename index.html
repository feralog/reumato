  h1 { font-size: 1.5rem; color: #f1f5f9; margin-bottom: 0.25rem; }
  .subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }

  /* MODULE SELECT */
  .module-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  @media (max-width: 500px) { .module-grid { grid-template-columns: 1fr; } }
  .module-btn {
    background: #273449;
    border: 2px solid #334155;
    border-radius: 8px;
    padding: 1rem;
    cursor: pointer;
    color: #e2e8f0;
    font-size: 0.9rem;
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
  }
  .module-btn:hover { border-color: #3b82f6; background: #1d3557; }
  .module-btn.selected { border-color: #3b82f6; background: #1d3557; }
  .module-btn .module-title { font-weight: 600; font-size: 0.95rem; }
  .module-btn .module-count { color: #64748b; font-size: 0.8rem; margin-top: 0.2rem; }
  .start-btn {
    width: 100%;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.85rem;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .start-btn:hover { background: #2563eb; }
  .start-btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

  /* QUIZ HEADER */
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    gap: 0.75rem;
  }
  .back-btn {
    background: transparent;
    color: #64748b;
    border: 2px solid #334155;
    border-radius: 8px;
    padding: 0.4rem 0.85rem;
    font-size: 0.85rem;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
  }
  .back-btn:hover { color: #94a3b8; border-color: #475569; }
  .module-label-text {
    color: #64748b;
    font-size: 0.82rem;
    text-align: right;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* QUESTION NAVIGATOR */
  .q-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    margin-bottom: 1.25rem;
    padding: 0.75rem;
    background: #0f172a;
    border-radius: 8px;
  }
  .q-nav-btn {
    width: 2rem;
    height: 2rem;
    border-radius: 6px;
    border: 2px solid #334155;
    background: #273449;
    color: #94a3b8;
    font-size: 0.72rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.12s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .q-nav-btn:hover { border-color: #3b82f6; color: #e2e8f0; }
  .q-nav-btn.current { border-color: #3b82f6; background: #1d3557; color: #93c5fd; }
  .q-nav-btn.ans-correct { border-color: #22c55e; background: #14532d; color: #bbf7d0; }
  .q-nav-btn.ans-wrong { border-color: #ef4444; background: #450a0a; color: #fecaca; }

  /* QUIZ */
  .progress-bar-wrap { background: #334155; border-radius: 99px; height: 6px; margin-bottom: 1.5rem; }
  .progress-bar { background: #3b82f6; border-radius: 99px; height: 6px; transition: width 0.3s; }
  .progress-text { color: #64748b; font-size: 0.8rem; margin-bottom: 0.5rem; }
  .question-text { font-size: 1.05rem; color: #f1f5f9; margin-bottom: 1.5rem; line-height: 1.6; }
  .options { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.5rem; }
  .option {
    background: #273449;
    border: 2px solid #334155;
    border-radius: 8px;
    padding: 0.85rem 1rem;
    cursor: pointer;
    color: #e2e8f0;
    font-size: 0.9rem;
    line-height: 1.5;
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
  }
  .option:hover:not(:disabled) { border-color: #3b82f6; background: #1d3557; }
  .option.selected { border-color: #3b82f6; background: #1d3557; }
  .option.correct { border-color: #22c55e; background: #14532d; color: #bbf7d0; }
  .option.wrong { border-color: #ef4444; background: #450a0a; color: #fecaca; }
  .option:disabled { cursor: default; }

  .confirm-btn {
    width: 100%;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.85rem;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .confirm-btn:hover { background: #2563eb; }
  .confirm-btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

  .feedback {
    background: #0f172a;
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 1rem;
    font-size: 0.88rem;
    line-height: 1.6;
    color: #cbd5e1;
  }
  .feedback strong { color: #f1f5f9; }
  .feedback.correct-fb { border-left: 4px solid #22c55e; }
  .feedback.wrong-fb { border-left: 4px solid #ef4444; }

  .next-btn {
    width: 100%;
    background: #475569;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.85rem;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 0.5rem;
  }
  .next-btn:hover { background: #64748b; }

  .finish-btn {
    width: 100%;
    background: #22c55e;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.85rem;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 0.5rem;
  }
  .finish-btn:hover { background: #16a34a; }

  /* RESULT SUMMARY */
  .score-big { font-size: 3rem; font-weight: 700; color: #3b82f6; margin: 1rem 0 0.25rem; }
  .score-label { color: #94a3b8; margin-bottom: 2rem; }
  .restart-btn {
    width: 100%;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.85rem;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 0.75rem;
    transition: background 0.15s;
  }
  .restart-btn:hover { background: #2563eb; }
  .home-btn {
    width: 100%;
    background: transparent;
    color: #64748b;
    border: 2px solid #334155;
    border-radius: 8px;
    padding: 0.85rem;
    font-size: 1rem;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .home-btn:hover { color: #94a3b8; border-color: #475569; }

  /* RESULT QUESTIONS REVIEW */
  .result-review {
    margin-top: 2rem;
    border-top: 1px solid #334155;
    padding-top: 1.5rem;
  }
  .result-review h2 { font-size: 1.05rem; color: #f1f5f9; margin-bottom: 1rem; }
  .result-q {
    background: #0f172a;
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 0.85rem;
    border-left: 4px solid #334155;
  }
  .result-q.rq-correct { border-left-color: #22c55e; }
  .result-q.rq-wrong   { border-left-color: #ef4444; }
  .result-q.rq-skipped { border-left-color: #475569; }
  .result-q-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.6rem;
    gap: 0.5rem;
  }
  .result-q-num { color: #64748b; font-size: 0.78rem; font-weight: 600; white-space: nowrap; }
  .result-badge {
    font-size: 0.72rem;
    font-weight: 600;
    padding: 0.18rem 0.5rem;
    border-radius: 4px;
    white-space: nowrap;
  }
  .badge-correct { background: #14532d; color: #bbf7d0; }
  .badge-wrong   { background: #450a0a; color: #fecaca; }
  .badge-skipped { background: #1e293b; color: #64748b; border: 1px solid #334155; }
  .result-q-text { font-size: 0.92rem; color: #f1f5f9; margin-bottom: 0.7rem; line-height: 1.55; }
  .result-opt {
    font-size: 0.84rem;
    padding: 0.45rem 0.75rem;
    border-radius: 6px;
    margin-bottom: 0.3rem;
    color: #64748b;
    background: #1e293b;
    border: 1px solid #2d3f55;
    line-height: 1.45;
  }
  .result-opt.ro-correct      { border-color: #22c55e; background: #14532d; color: #bbf7d0; }
  .result-opt.ro-user-wrong   { border-color: #ef4444; background: #450a0a; color: #fecaca; }
  .result-opt.ro-user-correct { border-color: #22c55e; background: #14532d; color: #bbf7d0; }
  .result-explanation {
    font-size: 0.82rem;
    color: #94a3b8;
    margin-top: 0.6rem;
    line-height: 1.55;
    border-top: 1px solid #334155;
    padding-top: 0.5rem;
  }

  .hidden { display: none; }
  .loading { color: #64748b; text-align: center; padding: 2rem 0; }
  .error { color: #f87171; text-align: center; padding: 2rem 0; }
</style>
</head>
<body>
<div id="app">

<div id="screen-home" class="screen active">
<div class="home-hero">
<div class="home-eyebrow"><div class="eyebrow-dot"></div><span class="eyebrow-text">Jornada Saúde 2026</span></div>
<h1 class="home-title">Quiz de<br><span>Preparação</span></h1>
<p class="home-sub">Escolha um módulo para começar</p>
</div>
<div class="modules-heading">Módulos</div>
<div class="module-list" id="module-list"></div>
</div>

<div id="screen-quiz" class="screen">
<div id="story-bar"></div>
<div class="quiz-hdr">
<button class="btn-back" onclick="goHome()">←</button>
<div class="mod-badge" id="mod-badge"></div>
<div class="streak-badge" id="streak-badge"></div>
</div>
<div id="q-scroll"><div id="q-card"></div></div>
<div class="quiz-foot">
<button class="btn-confirm" id="btn-confirm" onclick="confirmAnswer()" disabled>Confirmar</button>
<button class="btn-next" id="btn-next" onclick="nextQuestion()">Próxima →</button>
<button class="btn-skip" id="btn-skip" onclick="skipQuestion()">Pular questão</button>
</div>
</div>

<div id="screen-result" class="screen">
<div class="res-top">
<div class="res-mod-badge" id="res-mod-badge"></div>
<div class="res-score-num"><span id="res-score-val">0</span><span class="res-score-den" id="res-score-den">/30</span></div>
<div class="res-label" id="res-label"></div>
<div class="res-stats">
<div><div class="res-stat-val" id="res-pct">—</div><div class="res-stat-lbl">Acertos</div></div>
<div><div class="res-stat-val" id="res-streak">—</div><div class="res-stat-lbl">Maior sequência</div></div>
<div><div class="res-stat-val" id="res-skipped">—</div><div class="res-stat-lbl">Puladas</div></div>
</div>
</div>
<div class="res-actions">
<button class="btn-res-primary" onclick="restartQuiz()">Refazer este módulo</button>
<button class="btn-res-secondary" onclick="goHome()">← Escolher outro módulo</button>
</div>
<div class="res-divider"></div>
<div class="res-rev-label">Revisão das questões</div>
<div class="res-rev-list" id="res-rev-list"></div>
</div>

</div>

<canvas id="confetti-canvas"></canvas>

<script>
const MODULES=[{id:'apresentacao',label:'Jornada, SUS & APS',file:'questions_apresentacao.json',icon:'🏥',num:'01',theme:{accent:'#3b82f6',rgb:'59,130,246',gradA:'#060d1f',gradB:'#0d1f4a',gradC:'#1a3580',glow:'rgba(59,130,246,.3)',badgeBg:'rgba(59,130,246,.1)',badgeColor:'#93c5fd',iconBg:'rgba(59,130,246,.13)',cardAccent:'#3b82f6'}},{id:'saude_mental',label:'Saúde Mental & TMCs',file:'questions_saude_mental.json',icon:'🧠',num:'02',theme:{accent:'#8b5cf6',rgb:'139,92,246',gradA:'#0c0718',gradB:'#1c0a45',gradC:'#4c1d95',glow:'rgba(139,92,246,.3)',badgeBg:'rgba(139,92,246,.1)',badgeColor:'#c4b5fd',iconBg:'rgba(139,92,246,.13)',cardAccent:'#8b5cf6'}},{id:'insuf_cognitiva',label:'Demência, Delirium & Geriatria',file:'questions_insuf_cognitiva.json',icon:'🧬',num:'03',theme:{accent:'#d97706',rgb:'217,119,6',gradA:'#110d00',gradB:'#2c1e00',gradC:'#78350f',glow:'rgba(217,119,6,.3)',badgeBg:'rgba(217,119,6,.1)',badgeColor:'#fcd34d',iconBg:'rgba(217,119,6,.13)',cardAccent:'#d97706'}},{id:'adolescente',label:'Saúde do Adolescente',file:'questions_adolescente.json',icon:'🌱',num:'04',theme:{accent:'#059669',rgb:'5,150,105',gradA:'#001410',gradB:'#012b1f',gradC:'#064e3b',glow:'rgba(5,150,105,.3)',badgeBg:'rgba(5,150,105,.1)',badgeColor:'#6ee7b7',iconBg:'rgba(5,150,105,.13)',cardAccent:'#059669'}},{id:'ist_hiv',label:'ISTs & HIV',file:'questions_ist_hiv.json',icon:'💊',num:'05',theme:{accent:'#db2777',rgb:'219,39,119',gradA:'#130011',gradB:'#330025',gradC:'#831843',glow:'rgba(219,39,119,.3)',badgeBg:'rgba(219,39,119,.1)',badgeColor:'#f9a8d4',iconBg:'rgba(219,39,119,.13)',cardAccent:'#db2777'}}];let selectedModule=null,questions=[],currentIndex=0,score=0,userAnswers=[],questionShuffleMaps=[],shuffleMap=[],selectedOption=null,answered=false,currentStreak=0,maxStreak=0;const LETTERS=['A','B','C','D','E'];const hap={tap:()=>navigator.vibrate?.(8),correct:()=>navigator.vibrate?.(50),wrong:()=>navigator.vibrate?.([30,40,30]),next:()=>navigator.vibrate?.(10)};function applyTheme(t){const r=document.documentElement.style;r.setProperty('--accent',t.accent);r.setProperty('--accent-rgb',t.rgb);r.setProperty('--grad-a',t.gradA);r.setProperty('--grad-b',t.gradB);r.setProperty('--grad-c',t.gradC);r.setProperty('--glow',t.glow);r.setProperty('--badge-bg',t.badgeBg);r.setProperty('--badge-color',t.badgeColor);}function fisherYates(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}function renderHome(){document.getElementById('module-list').innerHTML=MODULES.map(m=>`<div class="module-card" onclick="startModule('${m.id}')" style="--mc-accent:${m.theme.cardAccent};--mc-icon-bg:${m.theme.iconBg}"><div class="mc-icon">${m.icon}</div><div class="mc-body"><div class="mc-num">${m.num}</div><div class="mc-name">${m.label}</div><div class="mc-count">30 questões</div></div><div class="mc-arrow">›</div></div>`).join('');}async function startModule(id){selectedModule=MODULES.find(m=>m.id===id);applyTheme(selectedModule.theme);try{const r=await fetch(selectedModule.file);if(!r.ok)throw new Error();const d=await r.json();questions=fisherYates([...d]);questionShuffleMaps=questions.map(()=>fisherYates([0,1,2,3,4]));}catch{alert('Erro ao carregar questões. Verifique a conexão.');return;}currentIndex=0;score=0;currentStreak=0;maxStreak=0;userAnswers=new Array(questions.length).fill(null);document.getElementById('mod-badge').textContent=selectedModule.label;buildStoryBar();showScreen('screen-quiz');renderQuestion(false);}function buildStoryBar(){document.getElementById('story-bar').innerHTML=questions.map((_,i)=>`<div class="seg" id="seg-${i}"><div class="seg-fill"></div></div>`).join('');updateStoryBar();}function updateStoryBar(){questions.forEach((_,i)=>{const e=document.getElementById(`seg-${i}`);if(!e)return;e.className='seg';const a=userAnswers[i];if(i===currentIndex)e.classList.add('s-current');else if(!a){}else if(a.skipped)e.classList.add('s-skipped');else if(a.isCorrect)e.classList.add('s-correct');else e.classList.add('s-wrong');});}function renderQuestion(a){const c=document.getElementById('q-card'),q=questions[currentIndex];shuffleMap=questionShuffleMaps[currentIndex];const h=shuffleMap.map((o,d)=>`<button class="opt" id="opt-${d}" onclick="selectOpt(${d})" data-orig="${o}"><span class="opt-letter">${LETTERS[d]}</span><span class="opt-text">${q.options[o]}</span></button>`).join('');c.innerHTML=`<div class="q-meta"><span>QUESTÃO ${currentIndex+1} / ${questions.length}</span><span class="score"><b>${score}</b> acerto${score!==1?'s':''}</span></div><p class="q-text">${q.question}</p><div class="opts" id="opts">${h}</div><div class="fb-banner" id="fb-banner"><span class="fb-icon"></span><span id="fb-msg"></span></div><div class="fb-expl" id="fb-expl"></div>`;const p=userAnswers[currentIndex];if(p){answered=true;if(!p.skipped){const d=shuffleMap.indexOf(0);applyVisuals(p.selectedOption,d,p.isCorrect,questions[currentIndex].explanation,false);}setNextPhase();}else{answered=false;selectedOption=null;setConfirmPhase();}if(a){c.classList.remove('anim-in','anim-out');void c.offsetWidth;c.classList.add('anim-in');}document.getElementById('q-scroll').scrollTop=0;updateStoryBar();}function selectOpt(d){if(answered)return;hap.tap();document.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));document.getElementById(`opt-${d}`).classList.add('sel');selectedOption=d;const b=document.getElementById('btn-confirm');b.disabled=false;b.classList.add('glow');}function confirmAnswer(){if(selectedOption===null||answered)return;answered=true;const d=shuffleMap.indexOf(0),c=selectedOption===d,o=shuffleMap[selectedOption];userAnswers[currentIndex]={selectedOption,origIdx:o,isCorrect:c,skipped:false};if(c){score++;currentStreak++;if(currentStreak>maxStreak)maxStreak=currentStreak;hap.correct();launchConfetti();}else{currentStreak=0;hap.wrong();}applyVisuals(selectedOption,d,c,questions[currentIndex].explanation,true);updateStreakBadge();setNextPhase();const e=document.querySelector('#q-card .score');if(e)e.innerHTML=`<b>${score}</b> acerto${score!==1?'s':''}`;updateStoryBar();setTimeout(()=>{const s=document.getElementById('q-scroll');s.scrollTo({top:s.scrollHeight,behavior:'smooth'});},150);}function applyVisuals(s,d,c,e,a){document.querySelectorAll('.opt').forEach((b,i)=>{b.disabled=true;b.classList.remove('sel');if(i===d){b.classList.add('correct');if(a)b.classList.add('anim-pop');}else if(i===s&&!c){b.classList.add('wrong');if(a)b.classList.add('anim-shake');}else b.classList.add('dimmed');});const bn=document.getElementById('fb-banner'),m=document.getElementById('fb-msg'),ex=document.getElementById('fb-expl');bn.className='fb-banner show '+(c?'ok':'err');bn.querySelector('.fb-icon').textContent=c?'✓':'✗';m.textContent=c?'Correto!':'Incorreto!';if(e){ex.textContent=e;ex.className='fb-expl show';}}function skipQuestion(){if(answered)return;answered=true;currentStreak=0;userAnswers[currentIndex]={skipped:true,isCorrect:false};updateStreakBadge();updateStoryBar();setNextPhase();}function nextQuestion(){hap.next();if(currentIndex>=questions.length-1){showResults();return;}const c=document.getElementById('q-card');c.classList.add('anim-out');setTimeout(()=>{currentIndex++;renderQuestion(true);setConfirmPhase();},210);}function setConfirmPhase(){const c=document.getElementById('btn-confirm'),n=document.getElementById('btn-next'),s=document.getElementById('btn-skip');c.style.display='';c.disabled=true;c.classList.remove('glow');n.classList.remove('show');s.style.display='';}function setNextPhase(){const c=document.getElementById('btn-confirm'),n=document.getElementById('btn-next'),s=document.getElementById('btn-skip');c.style.display='none';const l=currentIndex>=questions.length-1;n.textContent=l?'Ver resultado →':'Próxima →';n.classList.add('show');s.style.display='none';}function updateStreakBadge(){const b=document.getElementById('streak-badge');if(currentStreak>=3){b.textContent=`🔥 ${currentStreak}`;const w=b.classList.contains('on');b.classList.add('on');if(!w){b.classList.remove('on');void b.offsetWidth;b.classList.add('on');}}else b.classList.remove('on');}function showResults(){showScreen('screen-result');const t=questions.length,sk=userAnswers.filter(a=>a?.skipped).length,p=Math.round((score/t)*100),l=p>=80?'Excelente! 🏆':p>=60?'Bom resultado! 💪':p>=40?'Continue estudando 📚':'Vamos rever o conteúdo! 🔄';document.getElementById('res-mod-badge').textContent=selectedModule.label;document.getElementById('res-label').textContent=l;document.getElementById('res-pct').textContent=p+'%';document.getElementById('res-streak').textContent=maxStreak;document.getElementById('res-skipped').textContent=sk;document.getElementById('res-score-den').textContent='/'+t;animCount('res-score-val',0,score,900);renderReview();}function animCount(i,f,t,d){const e=document.getElementById(i),s=performance.now();function st(n){const p=Math.min((n-s)/d,1);e.textContent=Math.round(f+(t-f)*(1-Math.pow(1-p,3)));if(p<1)requestAnimationFrame(st);}requestAnimationFrame(st);}function renderReview(){const l=document.getElementById('res-rev-list');l.innerHTML=questions.map((q,i)=>{const a=userAnswers[i],m=questionShuffleMaps[i],ct=q.options[0];let dc,sc,st,ah='';if(!a||a.skipped){dc='sk';sc='#f59e0b';st='Pulada';}else if(a.isCorrect){dc='ok';sc='#4ade80';st='✓ Correta';ah=`<div class="rev-answers"><div class="rev-chip ok">✓ ${ct}</div></div>`;}else{dc='err';sc='#f87171';st='✗ Incorreta';const w=q.options[a.origIdx];ah=`<div class="rev-answers"><div class="rev-chip err">✗ Você: ${w}</div><div class="rev-chip ok">✓ Correta: ${ct}</div></div>`;}return`<div class="rev-item"><div class="rev-hdr"><div class="rev-dot ${dc}"></div><span class="rev-qnum">Q${i+1}</span><span class="rev-status" style="color:${sc}">${st}</span></div><p class="rev-qtext">${q.question}</p>${ah}${q.explanation?`<div class="rev-expl">${q.explanation}</div>`:''}</div>`;}).join('');}function restartQuiz(){startModule(selectedModule.id);}function goHome(){showScreen('screen-home');}function showScreen(i){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(i).classList.add('active');}(function(){const c=document.getElementById('confetti-canvas'),x=c.getContext('2d');let ps=[],r=null;function sz(){c.width=window.innerWidth;c.height=window.innerHeight;}sz();window.addEventListener('resize',sz);window.launchConfetti=function(){const ac=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim(),cls=['#22c55e','#fbbf24','#f472b6','#60a5fa','#a78bfa'],app=document.getElementById('app').getBoundingClientRect(),cx=app.left+app.width*0.5,cy=app.top+app.height*0.38;for(let i=0;i<28;i++){ps.push({x:cx+(Math.random()-0.5)*app.width*0.5,y:cy,vx:(Math.random()-0.5)*9,vy:-(Math.random()*9+2),color:i%2?ac:cls[Math.floor(Math.random()*cls.length)],w:Math.random()*6+3,h:Math.random()*4+2,rot:Math.random()*360,rv:(Math.random()-0.5)*12,life:1,decay:Math.random()*0.013+0.009});}if(!r)r=requestAnimationFrame(tk);};function tk(){x.clearRect(0,0,c.width,c.height);ps=ps.filter(p=>p.life>0);for(const p of ps){p.x+=p.vx;p.y+=p.vy;p.vy+=0.28;p.rot+=p.rv;p.life-=p.decay;x.save();x.globalAlpha=Math.max(0,p.life);x.translate(p.x,p.y);x.rotate(p.rot*Math.PI/180);x.fillStyle=p.color;x.fillRect(-p.w/2,-p.h/2,p.w,p.h);x.restore();}r=ps.length?requestAnimationFrame(tk):null;}})();renderHome();
</script>
</body>
</html>
