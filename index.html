function applyTheme(t){const r=document.documentElement.style;r.setProperty('--accent',t.accent);r.setProperty('--accent-rgb',t.rgb);r.setProperty('--grad-a',t.gradA);r.setProperty('--grad-b',t.gradB);r.setProperty('--grad-c',t.gradC);r.setProperty('--glow',t.glow);r.setProperty('--badge-bg',t.badgeBg);r.setProperty('--badge-color',t.badgeColor);}
function fisherYates(a){const arr=[...a];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function setMode(m){quizMode=m;document.getElementById('btn-mode-seq').classList.toggle('active',m==='seq');document.getElementById('btn-mode-rand').classList.toggle('active',m==='rand');}
function renderHome(){document.getElementById('module-list').innerHTML=MODULES.map(m=>{const data=QUIZ_DATA[m.id];const nc=data.filter(q=>q.type==='conteudista').length;const nr=data.filter(q=>q.type==='raciocinio').length;return `<div class="module-card" onclick="startModule('${m.id}')" style="--mc-accent:${m.theme.cardAccent};--mc-icon-bg:${m.theme.iconBg}"><div class="mc-icon">${m.icon}</div><div class="mc-body"><div class="mc-num">${m.num}</div><div class="mc-name">${m.label}</div><div class="mc-count">30 quest\u00f5es \u00b7 ${nc} conte\u00fado + ${nr} racioc\u00ednio</div></div><div class="mc-arrow">\u203a</div></div>`;}).join('');}
function startModule(id){selectedModule=MODULES.find(m=>m.id===id);applyTheme(selectedModule.theme);const raw=QUIZ_DATA[id];questions=quizMode==='rand'?fisherYates([...raw]):[...raw];questionShuffleMaps=questions.map(()=>fisherYates([0,1,2,3,4]));currentIndex=0;score=0;currentStreak=0;maxStreak=0;userAnswers=new Array(questions.length).fill(null);document.getElementById('mod-badge').textContent=selectedModule.label;buildStoryBar();showScreen('screen-quiz');renderQuestion(false);}
function buildStoryBar(){document.getElementById('story-bar').innerHTML=questions.map((_,i)=>`<div class="seg" id="seg-${i}"><div class="seg-fill"></div></div>`).join('');updateStoryBar();}
function updateStoryBar(){questions.forEach((_,i)=>{const e=document.getElementById(`seg-${i}`);if(!e)return;e.className='seg';const a=userAnswers[i];if(i===currentIndex)e.classList.add('s-current');else if(!a){}else if(a.skipped)e.classList.add('s-skipped');else if(a.isCorrect)e.classList.add('s-correct');else e.classList.add('s-wrong');});}
function renderQuestion(anim){const c=document.getElementById('q-card'),q=questions[currentIndex],smap=questionShuffleMaps[currentIndex];const tb=q.type==='raciocinio'?`<span class="q-type-badge raciocinio">Racioc\u00ednio</span>`:`<span class="q-type-badge conteudista">Conte\u00fado</span>`;const opts=smap.map((oi,di)=>`<button class="opt" id="opt-${di}" onclick="selectOpt(${di})" data-orig="${oi}"><span class="opt-letter">${LETTERS[di]}</span><span class="opt-text">${q.options[oi]}</span></button>`).join('');c.innerHTML=`<div class="q-meta"><span>Q ${currentIndex+1} / ${questions.length}</span>${tb}<span class="score"><b>${score}</b> acerto${score!==1?'s':''}</span></div><p class="q-text">${q.question}</p><div class="opts" id="opts">${opts}</div><div class="fb-banner" id="fb-banner"><span class="fb-icon"></span><span id="fb-msg"></span></div><div class="fb-expl" id="fb-expl"></div>`;const prev=userAnswers[currentIndex];if(prev){answered=true;if(!prev.skipped){const cd=smap.indexOf(0);applyVisuals(prev.selectedOption,cd,prev.isCorrect,q.explanation,false);}setNextPhase();}else{answered=false;selectedOption=null;setConfirmPhase();}if(anim){c.classList.remove('anim-in','anim-out');void c.offsetWidth;c.classList.add('anim-in');}document.getElementById('q-scroll').scrollTop=0;updateStoryBar();}
function selectOpt(di){if(answered)return;hap.tap();document.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));document.getElementById(`opt-${di}`).classList.add('sel');selectedOption=di;const b=document.getElementById('btn-confirm');b.disabled=false;b.classList.add('glow');}
function confirmAnswer(){if(selectedOption===null||answered)return;answered=true;const smap=questionShuffleMaps[currentIndex],cd=smap.indexOf(0),isCorrect=(selectedOption===cd),oi=smap[selectedOption];userAnswers[currentIndex]={selectedOption,origIdx:oi,isCorrect,skipped:false};if(isCorrect){score++;currentStreak++;if(currentStreak>maxStreak)maxStreak=currentStreak;hap.correct();launchConfetti();}else{currentStreak=0;hap.wrong();}applyVisuals(selectedOption,cd,isCorrect,questions[currentIndex].explanation,true);updateStreakBadge();setNextPhase();const sc=document.querySelector('#q-card .score');if(sc)sc.innerHTML=`<b>${score}</b> acerto${score!==1?'s':''}`;updateStoryBar();setTimeout(()=>{const s=document.getElementById('q-scroll');s.scrollTo({top:s.scrollHeight,behavior:'smooth'});},150);}
function applyVisuals(selDi,corDi,isCorrect,expl,animate){document.querySelectorAll('.opt').forEach((b,i)=>{b.disabled=true;b.classList.remove('sel');if(i===corDi){b.classList.add('correct');if(animate)b.classList.add('anim-pop');}else if(i===selDi&&!isCorrect){b.classList.add('wrong');if(animate)b.classList.add('anim-shake');}else b.classList.add('dimmed');});const bn=document.getElementById('fb-banner'),m=document.getElementById('fb-msg'),ex=document.getElementById('fb-expl');bn.className='fb-banner show '+(isCorrect?'ok':'err');bn.querySelector('.fb-icon').textContent=isCorrect?'\u2713':'\u2717';m.textContent=isCorrect?'Correto!':'Incorreto!';if(expl){ex.textContent=expl;ex.className='fb-expl show';}}
function skipQuestion(){if(answered)return;answered=true;currentStreak=0;userAnswers[currentIndex]={skipped:true,isCorrect:false};updateStreakBadge();updateStoryBar();setNextPhase();}
function nextQuestion(){hap.next();if(currentIndex>=questions.length-1){showResults();return;}const c=document.getElementById('q-card');c.classList.add('anim-out');setTimeout(()=>{currentIndex++;renderQuestion(true);setConfirmPhase();},210);}
function setConfirmPhase(){const c=document.getElementById('btn-confirm'),n=document.getElementById('btn-next'),s=document.getElementById('btn-skip');c.style.display='';c.disabled=true;c.classList.remove('glow');n.classList.remove('show');s.style.display='';}
function setNextPhase(){const c=document.getElementById('btn-confirm'),n=document.getElementById('btn-next'),s=document.getElementById('btn-skip');c.style.display='none';n.textContent=(currentIndex>=questions.length-1)?'Ver resultado \u2192':'Pr\u00f3xima \u2192';n.classList.add('show');s.style.display='none';}
function updateStreakBadge(){const b=document.getElementById('streak-badge');if(currentStreak>=3){b.textContent=`\uD83D\uDD25 ${currentStreak}`;const was=b.classList.contains('on');b.classList.add('on');if(!was){b.classList.remove('on');void b.offsetWidth;b.classList.add('on');}}else b.classList.remove('on');}
function showResults(){showScreen('screen-result');const t=questions.length,sk=userAnswers.filter(a=>a?.skipped).length,p=Math.round((score/t)*100);const lbl=p>=80?'Excelente! \uD83C\uDFC6':p>=60?'Bom resultado! \uD83D\uDCAA':p>=40?'Continue estudando \uD83D\uDCDA':'Vamos rever o conte\u00fado! \uD83D\uDD04';document.getElementById('res-mod-badge').textContent=MODULE_NAMES[selectedModule.id];document.getElementById('res-label').textContent=lbl;document.getElementById('res-pct').textContent=p+'%';document.getElementById('res-streak').textContent=maxStreak;document.getElementById('res-skipped').textContent=sk;document.getElementById('res-score-den').textContent='/'+t;animCount('res-score-val',0,score,900);renderReview();}
function animCount(id,from,to,dur){const e=document.getElementById(id),s=performance.now();function step(now){const p=Math.min((now-s)/dur,1);e.textContent=Math.round(from+(to-from)*(1-Math.pow(1-p,3)));if(p<1)requestAnimationFrame(step);}requestAnimationFrame(step);}
function renderReview(){const l=document.getElementById('res-rev-list');l.innerHTML=questions.map((q,i)=>{const a=userAnswers[i],ct=q.options[0];let dc,sc,st,ah='';if(!a||a.skipped){dc='sk';sc='#f59e0b';st='Pulada';}else if(a.isCorrect){dc='ok';sc='#4ade80';st='\u2713 Correta';ah=`<div class="rev-answers"><div class="rev-chip ok">\u2713 ${ct}</div></div>`;}else{dc='err';sc='#f87171';st='\u2717 Incorreta';const wr=q.options[a.origIdx];ah=`<div class="rev-answers"><div class="rev-chip err">\u2717 Voc\u00ea: ${wr}</div><div class="rev-chip ok">\u2713 Correta: ${ct}</div></div>`;}return `<div class="rev-item"><div class="rev-hdr"><div class="rev-dot ${dc}"></div><span class="rev-qnum">Q${i+1}</span><span class="rev-status" style="color:${sc}">${st}</span></div><p class="rev-qtext">${q.question}</p>${ah}${q.explanation?`<div class="rev-expl">${q.explanation}</div>`:''}</div>`;}).join('');}
function restartQuiz(){startModule(selectedModule.id);}
function goHome(){showScreen('screen-home');}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
(function(){const c=document.getElementById('confetti-canvas'),x=c.getContext('2d');let ps=[],r=null;function sz(){c.width=window.innerWidth;c.height=window.innerHeight;}sz();window.addEventListener('resize',sz);window.launchConfetti=function(){const cols=['#22c55e','#fbbf24','#f472b6','#60a5fa','#a78bfa'];const app=document.getElementById('app').getBoundingClientRect();const cx=app.left+app.width*.5,cy=app.top+app.height*.38;for(let i=0;i<28;i++)ps.push({x:cx+(Math.random()-.5)*app.width*.5,y:cy,vx:(Math.random()-.5)*9,vy:-(Math.random()*9+2),color:cols[Math.floor(Math.random()*cols.length)],w:Math.random()*6+3,h:Math.random()*4+2,rot:Math.random()*360,rv:(Math.random()-.5)*12,life:1,decay:Math.random()*.013+.009});if(!r)r=requestAnimationFrame(tk);};function tk(){x.clearRect(0,0,c.width,c.height);ps=ps.filter(p=>p.life>0);for(const p of ps){p.x+=p.vx;p.y+=p.vy;p.vy+=.28;p.rot+=p.rv;p.life-=p.decay;x.save();x.globalAlpha=Math.max(0,p.life);x.translate(p.x,p.y);x.rotate(p.rot*Math.PI/180);x.fillStyle=p.color;x.fillRect(-p.w/2,-p.h/2,p.w,p.h);x.restore();}r=ps.length?requestAnimationFrame(tk):null;}})();
renderHome();</script>
</body>
